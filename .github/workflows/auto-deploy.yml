# ============================================================
# auto-deploy.yml — GitHub Actions CI/CD
# COMPHONE SUPER APP V5.5
# ทำงานทุกครั้งที่ push ไปยัง main branch
# ============================================================

name: Auto Deploy — COMPHONE SUPER APP

on:
  push:
    branches: [ main ]
    paths:
      - 'pwa/**'
      - '*.gs'
      - 'clasp-ready/**'
      - 'scripts/**'
      - '.github/workflows/auto-deploy.yml'
      - 'memory/session.md'
  workflow_dispatch:    # รันด้วยตนเองได้จาก GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate & Lint
  # ─────────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax (PWA files)
        run: |
          echo "🔍 Checking JS syntax..."
          FAILED=0
          for f in pwa/*.js; do
            if node --check "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              FAILED=1
            fi
          done
          for f in scripts/pwa_static_guard.js scripts/pwa_api_smoke.js scripts/build_code_index.js scripts/pages_deploy_verify.js scripts/ci_readiness_check.js scripts/gas_source_alignment.js scripts/gas_syntax_guard.js scripts/sprint74_core_audit.js scripts/sprint75_jobs_billing_reports_audit.js scripts/sprint76_jobs_e2e_audit.js scripts/sprint77_billing_e2e_audit.js scripts/sprint78_reports_e2e_audit.js scripts/sprint79_vision_line_flow_audit.js scripts/set_gas_secret.js; do
            if node --check "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: PWA Static Guard
        run: |
          echo "Running PWA static guard..."
          node scripts/pwa_static_guard.js

      - name: Code Intelligence Index
        run: |
          echo "Running code intelligence / route drift guard..."
          node scripts/build_code_index.js

      - name: CI Readiness Check
        run: |
          echo "Running CI/CD readiness check..."
          node scripts/ci_readiness_check.js

      - name: GAS Source Alignment
        run: |
          echo "Checking root/clasp-ready GAS source alignment..."
          node scripts/gas_source_alignment.js

      - name: PWA API Smoke
        run: |
          echo "Running public PWA API smoke checks..."
          node scripts/pwa_api_smoke.js

      - name: 🛡️ Regression Guard
        run: |
          echo "Running regression guard..."
          chmod +x scripts/regression-guard.sh
          bash scripts/regression-guard.sh

      - name: 🛡️ Drift Guard
        run: |
          echo "Running drift guard..."
          chmod +x scripts/drift-guard.sh
          bash scripts/drift-guard.sh

      - name: 🛡️ Guard Self-Test
        run: |
          echo "Running guard self-test..."
          chmod +x scripts/guard-self-test.sh
          bash scripts/guard-self-test.sh

      - name: Check file sizes
        run: |
          echo "📦 File sizes:"
          du -sh pwa/*.js pwa/*.html clasp-ready/*.gs 2>/dev/null | sort -h

  # ─────────────────────────────────────────────
  # Job 2: Deploy PWA to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-pwa:
    name: Deploy PWA to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/pwa
          cp -R pwa/. site/pwa/
          printf '%s\n' \
            '<!doctype html>' \
            '<html><head>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=./pwa/">' \
            '<title>Comphone SuperApp</title>' \
            '<script>location.replace("./pwa/");</script>' \
            '</head><body><a href="./pwa/">Open Comphone SuperApp</a></body></html>' \
            > site/index.html

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ PWA deployed successfully!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"

      - name: Verify GitHub Pages freshness
        run: |
          echo "Checking whether GitHub Pages is serving this build..."
          node scripts/pages_deploy_verify.js

  # ─────────────────────────────────────────────
  # Job 3: Backup session.md เมื่อมีการเปลี่ยนแปลง
  # ─────────────────────────────────────────────
  backup-session:
    name: Backup session.md
    runs-on: ubuntu-latest
    needs: validate
    if: contains(github.event.head_commit.modified, 'memory/session.md') || contains(github.event.head_commit.added, 'memory/session.md')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create timestamped backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          mkdir -p backups/session
          cp memory/session.md "backups/session/session_${TIMESTAMP}.md"
          cp memory/session.md backups/session/session_latest.md
          echo "✅ Backup created: session_${TIMESTAMP}.md"

      - name: Commit backup
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backups/session/
          git diff --staged --quiet || git commit -m "🔄 Auto-backup session.md [skip ci]"
          git push

  # ─────────────────────────────────────────────
  # Job 4: Auto-tag release เมื่อ session.md version เปลี่ยน
  # ─────────────────────────────────────────────
  auto-tag:
    name: Auto Tag Release
    runs-on: ubuntu-latest
    needs: deploy-pwa
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from session.md
        id: version
        run: |
          VERSION=$(grep -oP 'v\d+\.\d+\.\d+' memory/session.md | head -1 || echo "v5.5.7")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create tag if not exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! git tag | grep -q "^${VERSION}$"; then
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git tag -a "$VERSION" -m "Release $VERSION — Auto-tagged by CI"
            git push origin "$VERSION"
            echo "✅ Tagged: $VERSION"
          else
            echo "ℹ️ Tag $VERSION already exists, skipping"
          fi
