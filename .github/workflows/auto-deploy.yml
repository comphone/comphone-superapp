# ============================================================
# auto-deploy.yml — GitHub Actions CI/CD
# COMPHONE SUPER APP V5.5
# ทำงานทุกครั้งที่ push ไปยัง main branch
# ============================================================

name: Auto Deploy — COMPHONE SUPER APP

on:
  push:
    branches: [ main ]
    paths:
      - 'pwa/**'
      - '*.gs'
      - 'clasp-ready/**'
      - 'scripts/**'
      - '.github/workflows/auto-deploy.yml'
      - 'memory/session.md'
  workflow_dispatch:    # รันด้วยตนเองได้จาก GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate & Lint
  # ─────────────────────────────────────────────
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax (PWA files)
        run: |
          echo "🔍 Checking JS syntax..."
          FAILED=0
          for f in pwa/*.js; do
            if node --check "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              FAILED=1
            fi
          done
          for f in scripts/pwa_static_guard.js scripts/pwa_api_smoke.js scripts/build_code_index.js scripts/pages_deploy_verify.js scripts/ci_readiness_check.js scripts/gas_source_alignment.js scripts/gas_syntax_guard.js scripts/sprint74_core_audit.js scripts/sprint75_jobs_billing_reports_audit.js scripts/sprint76_jobs_e2e_audit.js scripts/sprint77_billing_e2e_audit.js scripts/sprint78_reports_e2e_audit.js scripts/sprint79_vision_line_flow_audit.js scripts/sprint80_production_journey_audit.js scripts/sprint82_mobile_quick_actions_audit.js scripts/sprint83_mobile_core_workflows_audit.js scripts/sprint84_mobile_secondary_workflows_audit.js scripts/sprint85_live_mobile_menu_smoke.js scripts/sprint86_operator_ux_qa_checklist.js scripts/sprint87_protected_live_qa_runbook.js scripts/sprint98_operator_workflow_audit.js scripts/sprint99_live_readiness_audit.js scripts/sprint100_operator_menu_audit.js scripts/sprint101_write_lifecycle_audit.js scripts/sprint102_live_ux_menu_audit.js scripts/sprint103_visual_runtime_walkthrough.js scripts/sprint104_protected_browser_journey.js scripts/sprint105_record_detail_completeness.js scripts/sprint106_production_data_quality_guard.js scripts/sprint107_controlled_data_cleanup_plan.js scripts/sprint108_database_schema_registry_guard.js scripts/sprint109_data_repair_console_plan.js scripts/sprint111_controlled_data_repair_execution.js scripts/sprint112_admin_repair_console_audit.js scripts/sprint113_repair_console_live_qa.js scripts/sprint114_jobs_workflow_polish_audit.js scripts/sprint115_billing_resilience_audit.js scripts/sprint116_reports_drilldown_audit.js scripts/sprint117_vision_line_operational_loop_audit.js scripts/sprint119_inventory_po_warranty_audit.js scripts/sprint120_settings_admin_runtime_audit.js scripts/sprint121_performance_accessibility_audit.js scripts/sprint122_dashboard_operator_analytics_audit.js scripts/sprint123_live_visual_qa_guard.js scripts/sprint124_protected_visual_menu_qa.js scripts/sprint125_role_based_dashboard_widgets_audit.js scripts/sprint126_ai_vision_role_readiness_audit.js scripts/sprint127_vision_line_notification_controls_audit.js scripts/sprint128_line_notification_toggle_live_qa.js scripts/sprint129_vision_line_suppression_live_qa.js scripts/sprint131_line_real_send_readiness.js scripts/sprint132_core_workflow_live_qa.js scripts/sprint133_support_admin_live_qa.js scripts/sprint134_data_completeness_review.js scripts/sprint135_data_completeness_panel_audit.js scripts/sprint136_data_review_workflow_audit.js scripts/sprint137_backend_review_log_audit.js scripts/sprint138_backend_review_log_live_qa.js scripts/sprint139_data_cleanup_triage.js scripts/sprint140_jobs_billing_reports_live_polish.js scripts/sprint141_mobile_menu_deep_qa.js scripts/sprint142_ai_vision_real_use_readiness.js scripts/sprint143_permission_ops_hardening.js scripts/sprint144_owner_data_resolution.js scripts/sprint145_mobile_ux_walkthrough.js scripts/sprint146_ai_vision_pilot_workflow.js scripts/sprint147_dashboard_decision_layer_audit.js scripts/sprint148_ops_permission_cleanup.js scripts/sprint149_live_browser_visual_qa.js scripts/sprint150_data_cleanup_owner_workflow.js scripts/sprint151_dashboard_ux_polish_audit.js scripts/sprint152_ai_vision_real_pilot_guard.js scripts/sprint153_permission_fallback_closure.js scripts/sprint154_post_deploy_pages_confirmation.js scripts/sprint155_owner_data_backfill_readiness.js scripts/sprint156_mobile_menu_e2e_guard.js scripts/sprint157_pc_dashboard_workflow_guard.js scripts/sprint158_ai_vision_line_room_control_guard.js scripts/sprint159_post_deploy_publish_confirmation.js scripts/sprint160_real_browser_clickthrough_contract.js scripts/sprint161_protected_live_token_sweep.js scripts/sprint162_owner_data_cleanup_decision.js scripts/sprint163_ai_vision_real_sample_pilot.js scripts/sprint164_pages_publish_lock.js scripts/sprint165_browser_profile_clickthrough_pack.js scripts/sprint166_protected_token_full_sweep_pack.js scripts/sprint167_owner_cleanup_execution_readiness.js scripts/sprint168_ai_vision_real_sample_runbook.js scripts/sprint169_pages_fresh_release_gate.js scripts/sprint170_protected_browser_acceptance_gate.js scripts/sprint171_ai_vision_sample_evidence_contract.js scripts/sprint172_line_room_notification_matrix_gate.js scripts/sprint173_release_readiness_master_gate.js scripts/sprint174_strict_protected_browser_runbook.js scripts/sprint175_ai_vision_sample_pilot_gate.js scripts/sprint176_published_protected_acceptance.js scripts/sprint177_ai_vision_real_sample_evidence.js scripts/sprint178_strict_live_acceptance_gate.js scripts/sprint179_ai_vision_real_sample_execution.js scripts/sprint180_strict_protected_live_proof.js scripts/sprint181_ai_vision_owner_sample_run.js scripts/sprint182_smoke_cleanup_execution.js scripts/sprint183_line_ai_vision_ingress_guard.js scripts/sprint185_line_group_image_pilot.js scripts/sprint188_line_bot_reply_toggle_guard.js scripts/set_gas_secret.js; do
            if node --check "$f"; then
              echo "✅ $f"
            else
              echo "❌ $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then exit 1; fi

      - name: PWA Static Guard
        run: |
          echo "Running PWA static guard..."
          node scripts/pwa_static_guard.js

      - name: Code Intelligence Index
        run: |
          echo "Running code intelligence / route drift guard..."
          node scripts/build_code_index.js

      - name: CI Readiness Check
        run: |
          echo "Running CI/CD readiness check..."
          node scripts/ci_readiness_check.js

      - name: GAS Source Alignment
        run: |
          echo "Checking root/clasp-ready GAS source alignment..."
          node scripts/gas_source_alignment.js

      - name: PWA API Smoke
        run: |
          echo "Running public PWA API smoke checks..."
          node scripts/pwa_api_smoke.js

      - name: Sprint 85 Live Mobile Menu Smoke
        run: |
          echo "Running read-only live mobile menu smoke checks..."
          node scripts/sprint85_live_mobile_menu_smoke.js

      - name: 🛡️ Regression Guard
        run: |
          echo "Running regression guard..."
          chmod +x scripts/regression-guard.sh
          bash scripts/regression-guard.sh

      - name: 🛡️ Drift Guard
        run: |
          echo "Running drift guard..."
          chmod +x scripts/drift-guard.sh
          bash scripts/drift-guard.sh

      - name: 🛡️ Guard Self-Test
        run: |
          echo "Running guard self-test..."
          chmod +x scripts/guard-self-test.sh
          bash scripts/guard-self-test.sh

      - name: Check file sizes
        run: |
          echo "📦 File sizes:"
          du -sh pwa/*.js pwa/*.html clasp-ready/*.gs 2>/dev/null | sort -h

  # ─────────────────────────────────────────────
  # Job 2: Deploy PWA to GitHub Pages
  # ─────────────────────────────────────────────
  deploy-pwa:
    name: Deploy PWA to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/pwa
          cp -R pwa/. site/pwa/
          printf '%s\n' \
            '<!doctype html>' \
            '<html><head>' \
            '<meta charset="utf-8">' \
            '<meta http-equiv="refresh" content="0; url=./pwa/">' \
            '<title>Comphone SuperApp</title>' \
            '<script>location.replace("./pwa/");</script>' \
            '</head><body><a href="./pwa/">Open Comphone SuperApp</a></body></html>' \
            > site/index.html

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ PWA deployed successfully!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"

      - name: Verify GitHub Pages freshness
        run: |
          echo "Checking whether GitHub Pages is serving this build..."
          node scripts/pages_deploy_verify.js

  # ─────────────────────────────────────────────
  # Job 3: Backup session.md เมื่อมีการเปลี่ยนแปลง
  # ─────────────────────────────────────────────
  backup-session:
    name: Backup session.md
    runs-on: ubuntu-latest
    needs: validate
    if: contains(github.event.head_commit.modified, 'memory/session.md') || contains(github.event.head_commit.added, 'memory/session.md')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create timestamped backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          mkdir -p backups/session
          cp memory/session.md "backups/session/session_${TIMESTAMP}.md"
          cp memory/session.md backups/session/session_latest.md
          echo "✅ Backup created: session_${TIMESTAMP}.md"

      - name: Commit backup
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add backups/session/
          git diff --staged --quiet || git commit -m "🔄 Auto-backup session.md [skip ci]"
          git push

  # ─────────────────────────────────────────────
  # Job 4: Auto-tag release เมื่อ session.md version เปลี่ยน
  # ─────────────────────────────────────────────
  auto-tag:
    name: Auto Tag Release
    runs-on: ubuntu-latest
    needs: deploy-pwa
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from session.md
        id: version
        run: |
          VERSION=$(grep -oP 'v\d+\.\d+\.\d+' memory/session.md | head -1 || echo "v5.5.7")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create tag if not exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! git tag | grep -q "^${VERSION}$"; then
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git tag -a "$VERSION" -m "Release $VERSION — Auto-tagged by CI"
            git push origin "$VERSION"
            echo "✅ Tagged: $VERSION"
          else
            echo "ℹ️ Tag $VERSION already exists, skipping"
          fi
