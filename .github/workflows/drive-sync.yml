name: Drive Backup Sync

on:
  push:
    branches: [main]
    paths:
      - 'backups/**'
      - 'memory/**'
      - '.github/workflows/drive-sync.yml'
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync scope'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - session-only
          - code-only

permissions:
  contents: read

concurrency:
  group: drive-backup-sync
  cancel-in-progress: false

jobs:
  backup:
    name: Sync to Google Drive
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Google Drive secret
        id: secret_check
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
            echo "secret_type=json" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
            echo "secret_type=base64" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "secret_type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when secret is missing
        if: steps.secret_check.outputs.has_secret == 'false'
        shell: bash
        run: |
          {
            echo "## Drive Backup Sync skipped"
            echo ""
            echo "Google Drive backup secrets are not configured."
            echo "Application deploy is not blocked."
            echo ""
            echo "Configure one repository secret when backup is required:"
            echo "- GOOGLE_SERVICE_ACCOUNT_JSON"
            echo "- GOOGLE_SERVICE_ACCOUNT_KEY"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup service account
        if: steps.secret_check.outputs.has_secret == 'true'
        shell: bash
        run: |
          mkdir -p ~/.config/rclone
          if [ "${{ steps.secret_check.outputs.secret_type }}" = "json" ]; then
            printf '%s' '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > ~/.config/rclone/service-account.json
          else
            echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" | base64 -d > ~/.config/rclone/service-account.json
          fi

      - name: Install rclone
        if: steps.secret_check.outputs.has_secret == 'true'
        shell: bash
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone
        if: steps.secret_check.outputs.has_secret == 'true'
        shell: bash
        run: |
          printf '%s\n' \
            '[gdrive]' \
            'type = drive' \
            'scope = drive' \
            'service_account_file = ~/.config/rclone/service-account.json' \
            > ~/.config/rclone/rclone.conf

      - name: Test Drive access
        if: steps.secret_check.outputs.has_secret == 'true'
        shell: bash
        run: |
          rclone lsd gdrive:
          echo "comphone-test-$(date +%s)" > /tmp/rclone_write_test.txt
          rclone copy /tmp/rclone_write_test.txt gdrive:ComphoneBackup/.github_test/ --stats-one-line

      - name: Sync backups
        if: steps.secret_check.outputs.has_secret == 'true' && inputs.sync_type != 'session-only'
        shell: bash
        run: |
          if [ -d "./backups" ] && [ -n "$(ls -A ./backups 2>/dev/null)" ]; then
            rclone copy ./backups gdrive:ComphoneBackup --stats-one-line
          else
            echo "No local backups to sync."
          fi

      - name: Sync session
        if: steps.secret_check.outputs.has_secret == 'true' && inputs.sync_type != 'code-only'
        shell: bash
        run: |
          if [ -f "memory/session.md" ]; then
            rclone copy memory/session.md gdrive:ComphoneBackup/session/ --stats-one-line
          elif [ -f "session.md" ]; then
            rclone copy session.md gdrive:ComphoneBackup/session/ --stats-one-line
          else
            echo "No session file to sync."
          fi
