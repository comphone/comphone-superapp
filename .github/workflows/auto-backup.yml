name: Auto Backup & Sync

on:
  push:
    branches: [ main ]
  schedule:
    # ทำงานทุกวัน เวลา 02:00 น. (UTC+7 = 09:00 น. ไทย)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # สามารถรันมือได้จาก GitHub Actions tab

jobs:
  backup-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set backup date tag
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create daily backup tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="backup-${{ steps.date.outputs.DATE }}"
          # สร้าง tag ใหม่ถ้ายังไม่มี
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Auto backup: ${{ steps.date.outputs.DATE }}"
            git push origin "$TAG"
            echo "✅ Created backup tag: $TAG"
          else
            echo "ℹ️ Tag $TAG already exists, skipping"
          fi

      - name: Summary
        run: |
          echo "## 📦 Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** ${{ steps.date.outputs.DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Backup tag created" >> $GITHUB_STEP_SUMMARY
