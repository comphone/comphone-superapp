name: Deploy LINE Webhook Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/line-webhook/**'
      - '.github/workflows/deploy-line-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/line-webhook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: node --check src/index.js

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 838d6a5a046bfaa2a2003bd8005dd80b
