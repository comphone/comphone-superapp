name: Deploy LINE Webhook Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/line-webhook/**'
      - '.github/workflows/deploy-line-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: workers/line-webhook
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workers/line-webhook/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check scripts/verify-production.mjs

      - name: Verify Cloudflare deploy credential
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing Cloudflare credential::Add CLOUDFLARE_API_TOKEN to repository Actions secrets before deploying the LINE Worker."
            exit 1
          fi

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 838d6a5a046bfaa2a2003bd8005dd80b

      - name: Verify production Worker
        run: npm run verify:production
        env:
          LINE_WORKER_URL: https://comphone-line-webhook.narinoutagit.workers.dev
          LINE_WORKER_REPORT: worker_production_evidence.json

      - name: Upload production verification evidence
        if: always() && hashFiles('workers/line-webhook/worker_production_evidence.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: line-worker-production-evidence
          path: workers/line-webhook/worker_production_evidence.json
          retention-days: 30
