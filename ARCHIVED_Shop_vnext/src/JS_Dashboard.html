<script>
// V347 - Comphone Dashboard (Modular - JS in JS_Dashboard.html)
var DA=null,JO2=[],IN2=[],CV=null,PP=0,JA2=[],JS2=0,JB2=20;
function se2(t,d){var ld=document.getElementById('ld');if(ld)ld.style.display='none';var eb=document.getElementById('eb');if(eb){eb.style.display='block';var ed=document.getElementById('ed');if(ed)ed.textContent=String(t)+' '+String(d||'')}}
function sr2(h){var ld=document.getElementById('ld');if(ld)ld.style.display='none';var eb=document.getElementById('eb');if(eb)eb.style.display='none';var r=document.getElementById('rb');if(r){r.style.display='block';r.innerHTML=h;var q=document.getElementById('qab');if(q)q.style.display='flex'}}
function om2(h){var mc=document.getElementById('mc');if(mc)mc.innerHTML=h;var mo=document.getElementById('mo');if(mo)mo.classList.add('op')}
function cl(){var mo=document.getElementById('mo');if(mo)mo.classList.remove('op')}
function fj2(id){if(!JO2)return null;for(var i=0;i<JO2.length;i++){if(JO2[i].id===id)return JO2[i]}return null}
function es2(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function gs2(s){if(!s)return'a3';if(String(s).charAt(0)==='ร')return'a1';if(s==='InProgress'||String(s).charAt(0)==='ก')return'a2';if(String(s).indexOf('ยก')>-1)return'a4';return'a3'}
function gsl2(s){if(!s)return'\ud83d\udcdc';if(String(s).charAt(0)==='ร')return'\u23f3 รอ';if(s==='InProgress'||String(s).charAt(0)==='ก')return'\ud83d\udd04 กำลังทำ';if(String(s).indexOf('ยก')>-1)return'\u274c ยกเลิก';return'\u2705 เสร็จ'}
function gsb2(s){if(!s)return'b3';if(String(s).charAt(0)==='ร')return'b1';if(s==='InProgress'||String(s).charAt(0)==='ก')return'b2';if(String(s).indexOf('ยก')>-1)return'b4';return'b3'}

function render2(d){
try{
var s=(d&&d.summary)||{};var jobs=(d&&d.jobs)||[];var inv=(d&&d.inventory)||[];
var p=s.pending||0,ip2=s.inProgress||0,c2=s.completed||0,ls=s.lowStock||0;
var pp=s.pendingPhotos||0,tj=s.totalJobs||0,ti2=s.totalItems||0;
var h='';
h+='<div class="tl">';
h+='<div class="tt"><div class="n c1">'+p+'</div><div class="l">\u23f3 รอดำเนินการ</div></div>';
h+='<div class="tt"><div class="n c2">'+ip2+'</div><div class="l">\ud83d\udd04 กำลังทำ</div></div>';
h+='<div class="tt"><div class="n c3">'+c2+'</div><div class="l">\u2705 เสร็จ</div></div>';
h+='<div class="tt"><div class="n c4">'+ls+'</div><div class="l">\ud83d\udee0\ufe0f สต็อกต่ำ</div></div>';
h+='<div class="tt"><div class="n" style="color:var(--cyan)">'+tj+'</div><div class="l">\ud83d\udcbc ทั้งหมด</div></div>';
h+='<div class="tt"><div class="n" style="color:var(--t2)">'+ti2+'</div><div class="l">\ud83d\udce6 สินค้า</div></div>';
h+='</div>';
h+='<div class="pq"><h3>\ud83d\udcf8 รูปที่รอจัดหมวด</h3>';
h+='<div class="row"><div class="cnt">'+pp+'</div><div class="lbl">รูปที่รอจจัดการ</div></div>';
if(pp>0){h+='<button class="btn" style="margin-top:8px;background:linear-gradient(135deg,var(--purple),#8b5cf6)" onclick="procPhotos()">\u23e9 จัดรูป</button>'}
else{h+='<button class="btn cy" style="margin-top:8px" onclick="procPhotos()">\ud83e\udd16 ตรวจตามรูป</button>'}
h+='</div>';
h+='<div id="fl"><div style="font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:600">\ud83d\udd0d ค้นหา</div>';
h+='<input type="text" id="fs" placeholder="ชื่ลูกค้า, JobID..." oninput="aF()" style="margin-top:2px">';
h+='<div class="rw"><select id="ft" onchange="aF()"><option value="">ช่างทั้งหมด</option>';
var tks={};for(var ti3=0;ti3<Math.min(jobs.length,50);ti3++){var jt=jobs[ti3].tech;if(jt&&jt!=="-")tks[jt]=1}
var tkk=Object.keys(tks);for(var ki=0;ki<tkk.length;ki++)h+='<option value="'+es2(tkk[ki])+'">'+es2(tkk[ki])+'</option>';
h+='</select><select id="fst" onchange="aF()"><option value="">ทุกสถานะ</option>';
h+='<option value="รอดำเนินการ">\u23f3 รอ</option><option value="InProgress">\ud83d\udd04 กำลังทำ</option><option value="Completed">\u2705 เสร็จ</option><option value="ยกเลิก">\u274c ยกเลิก</option></select></div></div>';
JA2=jobs;JS2=0;
h+='<div class="ca"><h3>\ud83d\udd27 งานล่าสุด</h3><div id="jl"></div><div id="lm"></div></div>';
h+='<div class="ca"><h3>\ud83d\udce6 คลังสินค้า</h3>';
for(var kk=0;kk<Math.min(inv.length,20);kk++){var it=inv[kk];h+='<div class="si"><div><div class="sn">'+es2(it.name)+'</div><div class="sc">'+es2(it.code)+'</div></div><div class="sq '+(it.alert?'lo':'ok')+'">'+it.qty+'</div></div>'}
h+='</div>';
h+='<button class="btn ln" onclick="senSum()">\ud83d\udc9a ส่งสรุป LINE</button>';
h+='<button class="btn pu" onclick="opJob()">\u2795 เปิดงานใหม่</button>';
PP=pp;
if(s.date){var ck=document.getElementById('clock');if(ck)ck.textContent=s.date}
sr2(h);ldJobs();aF()
}catch(e){se2('Render error',e.message)}
}

function ldJobs(){
try{
var el=document.getElementById('jl');var lm=document.getElementById('lm');if(!el||!JA2)return;
var jobs=JA2;var end=Math.min(JS2+JB2,jobs.length);
for(var i=JS2;i<end;i++){
var j=jobs[i];var sc=gs2(j.status);
var card=document.createElement('div');
card.className='jc '+sc;
card.setAttribute('data-cust',String(j.customer||'').toLowerCase());
card.setAttribute('data-jid',String(j.id||'').toLowerCase());
card.setAttribute('data-symp',String(j.symptom||'').toLowerCase());
card.setAttribute('data-tech',j.tech||'');
card.setAttribute('data-stat',j.status||'');
card.onclick=(function(xid){return function(){vJb(xid)}})(j.id);
var inner='';
inner+='<span class="ji">'+j.id+'</span>';
inner+='<span class="jb '+gsb2(j.status)+'">'+gsl2(j.status)+'</span>';
inner+='<div class="jn">'+es2(j.customer)+'</div>';
if(j.symptom)inner+='<div class="jy">'+es2(j.symptom)+'</div>';
inner+='<div class="jm">\ud83d\udd27 '+(j.tech||'-');
if(j.created)inner+=' \ud83d\udd50 '+j.created;
inner+='</div>';
card.innerHTML=inner;
el.appendChild(card)
}
JS2=end;
if(lm){
if(end<jobs.length){var btn=document.createElement('div');btn.className='load-more';btn.innerHTML='\u2b07\ufe0f โหลดเพิ่ม ('+end+' / '+jobs.length+')';btn.onclick=ldJobs;lm.innerHTML='';lm.appendChild(btn)}
else{lm.innerHTML=''}
}
}catch(e){console.log('ldJobs error:',e)}
}

function aF(){
try{
var cards=document.querySelectorAll('.jc');if(!cards||cards.length===0)return;
var si=document.getElementById('fs');if(!si)return;
var st4=document.getElementById('ft');var st5=document.getElementById('fst');
var q=(si.value||'').toLowerCase();
var t=st4?(st4.value||''):'';var s=st5?(st5.value||''):'';
for(var i=0;i<cards.length;i++){
var cd=cards[i];var match=true;
if(q){var cc=(cd.getAttribute('data-cust')||'').toLowerCase();var cj2=(cd.getAttribute('data-jid')||'').toLowerCase();var cs=(cd.getAttribute('data-symp')||'').toLowerCase();if(cc.indexOf(q)===-1&&cj2.indexOf(q)===-1&&cs.indexOf(q)===-1)match=false}
if(t&&(cd.getAttribute('data-tech')||'')!==t)match=false;
if(s&&(cd.getAttribute('data-stat')||'')!==s)match=false;
if(match){cd.style.display='block'}else{cd.style.display='none'}
}
}catch(e){console.log('aF error:',e)}
}

function rfr(){
try{
if(typeof google==='undefined'){se2('ไม่พร้อม','เปิดผ่าน Web App URL เท่านั้น');return}
google.script.run.withSuccessHandler(function(d2){
try{DA=d2;JO2=(d2&&d2.jobs)||[];IN2=(d2&&d2.inventory)||[];
if(d2&&d2.summary&&d2.summary.date){var ck=document.getElementById('clock');if(ck)ck.textContent=d2.summary.date}
render2(d2)}catch(e3){se2('Render',e3.message||e3)}
}).withFailureHandler(function(e){se2('Fail',e.message||e)}).getDashboardData()
}catch(e){se2('Refresh',e.message||e)}
}

function vJb(id){
var j=fj2(id);if(!j){alert('ไม่พบงาน '+id);return}
CV=id;
var h2='<h2>\ud83d\udccb '+j.id+'</h2>';
h2+='<div class="su">'+es2(j.customer)+'</div>';
h2+='<div class="dt">\ud83d\udccc '+es2(j.symptom||'-')+'\n\ud83d\udcdd '+j.status+'\n\ud83d\udd27 '+(j.tech||'-')+'\n\ud83d\udd50 '+(j.created||'-')+'</div>';
h2+='<div class="ac">';
h2+='<div class="b2 bb" onclick="oSt2('+JSON.stringify(id)+')">เปลี่ยนสถานะ</div>';
h2+='<div class="b2 bx" onclick="eJb2('+JSON.stringify(id)+')">\u270f\ufe0f แก้ไข</div>';
if(j.folder)h2+='<div class="b2 ba" onclick="window.open('+JSON.stringify(j.folder)+",'_blank')\">\ud83d\udcc1 โฟลเดอร์</div>";
h2+='</div><hr style="margin:10px 0;border-color:var(--border)">';
h2+='<div style="font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:600">\ud83d\udcdd หมายเหตุ</div>';
h2+='<textarea id="qnote" rows="2" placeholder="พิมพ์..."></textarea>';
h2+='<button class="btn" onclick="adNote('+JSON.stringify(id)+')">\ud83d\udcbe บันทึก</button>';
h2+='<hr style="margin:10px 0;border-color:var(--border)">';
h2+='<div style="font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:600">\ud83d\udcdc ประวัติ</div>';
h2+='<div id="jtl"></div>';
h2+='<hr style="margin:10px 0;border-color:var(--border)">';
h2+='<div class="ac">';
h2+='<div class="b2 bx" onclick="cl()">\u2715 ปิด</div>';
h2+='</div>';
om2(h2);
try{
google.script.run.withSuccessHandler(function(r){
var el2=document.getElementById('jtl');if(!el2)return;
if(r&&r.timeline&&r.timeline.length>0){
var x='';for(var i=0;i<Math.min(r.timeline.length,20);i++){var e2=r.timeline[i];x+='<div class="ti"><div class="ts">'+e2.ts+'</div><div class="tn">'+e2.action+'</div><div class="td">'+e2.detail+'</div></div>'}
el2.innerHTML=x
}else{el2.innerHTML='<div class="nr">ยังไม่มีบันทึก</div>'}
}).getJobTimeline(id)
}catch(e){console.log('timeline error:',e)}
}

function adNote(id){
try{
var n=document.getElementById('qnote');if(!n||!n.value){alert('พิมพ์ก่อน');return}
google.script.run.withSuccessHandler(function(){alert('\u2705 บันทึกแล้ว');cl();rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).addQuickNote(id,n.value,'โหน่ง')
}catch(e){alert('ผิดพลาด: '+e.message)}
}

function shNote(){
try{
var h2='<h2>\ud83d\udcdd หมายเหตุ</h2>';
h2+='<input type="text" id="qj" placeholder="Job ID (เช่น J0001)" style="margin-top:8px">';
h2+='<textarea id="qn" rows="3" placeholder="ข้อความหมายเหตุ..." style="margin-top:6px"></textarea>';
h2+='<button class="btn" onclick="adNote2()">\ud83d\udcbe บันทึก</button>';
h2+='<button class="btn" style="background:#999" onclick="cl()">ยกเลิก</button>';
om2(h2)
}catch(e){alert('ผิด: '+e.message)}
}

function adNote2(){
try{
var id=document.getElementById('qj').value;var n=document.getElementById('qn').value;
if(!id){alert('ใส่ Job ID');return}
if(!n){alert('ใส่หมายเหตุ');return}
google.script.run.withSuccessHandler(function(){alert('\u2705 บันทึกแล้ว');cl();rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).addQuickNote(id,n,'โหน่ง')
}catch(e){alert('ผิด: '+e.message)}
}

function opJob(){
try{
var h2='<h2>\u2795 เปิดงานใหม่</h2>';
h2+='<input type="text" id="nn" placeholder="ชื่ลูกค้า *" style="margin-top:8px">';
h2+='<input type="text" id="np" placeholder="เบอร์โทร" style="margin-top:5px">';
h2+='<textarea id="ns" rows="2" placeholder="อาการ/รายละเอียด *" style="margin-top:5px"></textarea>';
h2+='<input type="text" id="nt" placeholder="ช่าง" style="margin-top:5px">';
h2+='<button class="btn" onclick="doOpen()">\ud83d\ude80 เปิดงาน</button>';
h2+='<button class="btn" style="background:#999" onclick="cl()">ยกเลิก</button>';
om2(h2)
}catch(e){alert('ผิด: '+e.message)}
}

function doOpen(){
try{
var d={name:document.getElementById('nn').value,phone:document.getElementById('np').value,symptom:document.getElementById('ns').value,tech:document.getElementById('nt').value};
if(!d.name){alert('ใส่ชื่ลูกค้า');return}
google.script.run.withSuccessHandler(function(r){alert('\ud83c\udf89 เปิดงาน: '+(r.job_id||'?'));cl();rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).openJob(d)
}catch(e){alert('ผิด: '+e.message)}
}

function senSum(){
try{
google.script.run.withSuccessHandler(function(r){if(r&&r.success)alert('\u2705 ส่ง LINE สำเร็จ');else alert('\u274c '+JSON.stringify(r));rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).sendDashboardSummary()
}catch(e){alert('ผิด: '+e.message)}
}

function oSt2(id){
try{
var j=fj2(id);if(!j)return;
var h2='<h2>\ud83d\udcdd เปลี่ยนสถานะ</h2>';
h2+='<div class="su">'+id+' - '+es2(j.customer)+'</div>';
h2+='<div style="margin-bottom:8px">ปัจจับัน: '+j.status+'</div>';
h2+='<div class="ac">';
h2+='<div class="b2 ba" onclick="cSt2('+JSON.stringify(id)+',\'รอดำเนินการ\')">\u23f3 รอ</div>';
h2+='<div class="b2 bb" onclick="cSt2('+JSON.stringify(id)+',\'InProgress\')">\ud83d\udd04 กำลังทำ</div>';
h2+='<div class="b2 bp" onclick="cSt2('+JSON.stringify(id)+',\'Completed\')">\u2705 เสร็จ</div>';
h2+='<div class="b2 bx" onclick="cSt2('+JSON.stringify(id)+',\'ยกเลิก\')">\u274c ยกเลิก</div>';
h2+='</div>';
h2+='<div class="b2 bx" onclick="cl()" style="margin-top:8px">ปิด</div>';
om2(h2)
}catch(e){alert('ผิด: '+e.message)}
}

function cSt2(id,s){
try{
google.script.run.withSuccessHandler(function(){cl();alert('\u2705 '+s);rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).updateJobStatus({job_id:id,status:s,note:'Dashboard'})
}catch(e){alert('ผิด: '+e.message)}
}

function eJb2(id){
try{
var j=fj2(id);if(!j)return;
var h2='<h2>\u270f\ufe0f แก้ไข: '+id+'</h2>';
h2+='<div class="su">'+es2(j.customer)+'</div>';
h2+='<input type="text" id="en" value="'+es2(j.customer)+'" style="margin-top:5px">';
h2+='<textarea id="es" rows="2" style="margin-top:5px">'+es2(j.symptom||'')+'</textarea>';
h2+='<input type="text" id="et" value="'+es2(j.tech||'')+'" style="margin-top:5px">';
h2+='<button class="btn" onclick="doSave('+JSON.stringify(id)+')">\ud83d\udcbe บันทึก</button>';
h2+='<button class="btn" style="background:#999" onclick="cl()">ยกเลิก</button>';
om2(h2)
}catch(e){alert('ผิด: '+e.message)}
}

function doSave(id){
try{
var d={name:document.getElementById('en').value,symptom:document.getElementById('es').value,tech:document.getElementById('et').value};
google.script.run.withSuccessHandler(function(){alert('\u2705 แก้ไขแล้ว');cl();rfr()}).withFailureHandler(function(e){alert('\u274c '+e.message)}).updateJobById(id,d)
}catch(e){alert('ผิด: '+e.message)}
}

function procPhotos(){
try{
if(!confirm('เริ่มจัดรูปทั้งหมด?'))return;
google.script.run.withSuccessHandler(function(r){
var msg='\u26a1 จัดรูปเสร็จสิ้น!\n\n';
if(r){msg+='สำเร็จ: '+(r.successful||0)+' รูป\n';msg+='ผิดพลาด: '+(r.failed||0)+' รูป'}
else{msg+=JSON.stringify(r)}
alert(msg);rfr()
}).withFailureHandler(function(e){alert('\u274c '+e.message)}).handleProcessPhotos()
}catch(e){alert('ผิด: '+e.message)}
}

// ===== INIT =====
(function(){
try{
if(typeof google==='undefined'){se2('Google Script ไม่พร้อม','เปิดผ่าน Web App URL เท่านั้น');return}
google.script.run.withSuccessHandler(function(d){
try{DA=d;JO2=(d&&d.jobs)||[];IN2=(d&&d.inventory)||[];
if(d&&d.summary&&d.summary.date){var ck=document.getElementById('clock');if(ck)ck.textContent=d.summary.date}
console.log('Loaded:',JO2.length,'jobs,',IN2.length,'items');
render2(d)
}catch(e){se2('Render',e.message||e)}
}).withFailureHandler(function(e){se2('getDashboardData',e.message||e)}).getDashboardData()
}catch(e){se2('Init',e.message||e)}
})();

console.log('V347 Modular loaded');
</script>
