<script>
var DATA=null,JOBS=[],INVENTORY=[],CURRENT_JOB_ID=null,ALL_JOBS=[],J_SWIPER=null,CHART=null;
function showLoading(){var b=document.getElementById('loadingBar');if(b)b.style.display='block'}
function hideLoading(){var b=document.getElementById('loadingBar');if(b)b.style.display='none';var l=document.getElementById('ld');if(l)l.style.display='none'}
function showError(t,d){hideLoading();var l=document.getElementById('ld');if(l)l.style.display='none';var e=document.getElementById('eb');if(e){e.style.display='block';var p=document.getElementById('ed');if(p)p.textContent=t+'\n'+(d||'')}}
function showContent(){hideLoading();var r=document.getElementById('rb');if(r)r.style.display='block';var e=document.getElementById('eb');if(e)e.style.display='none'}
function openModal(h){var c=document.getElementById('modalContent');if(c)c.innerHTML=h;var o=document.getElementById('modalOverlay');if(o)o.classList.add('open');document.body.style.overflow='hidden'}
function closeModal(){var o=document.getElementById('modalOverlay');if(o)o.classList.remove('open');document.body.style.overflow='';CURRENT_JOB_ID=null}
function findJob(id){if(!JOBS)return null;for(var i=0;i<JOBS.length;i++){if(JOBS[i].id===id)return JOBS[i]}return null}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m,t){try{var e=document.getElementById('toast');if(!e)return;e.textContent=m;e.className='toast-custom show';if(t==='er')e.className+=' er';else if(t==='wa')e.className+=' wa';else e.className+=' ok';clearTimeout(toast._t);toast._t=setTimeout(function(){e.className='toast-custom'},2800)}catch(x){}}
function setBtnLoading(b,l,t){try{if(!b)return;b.disabled=l;if(l&&t){b._orig=b.textContent;b.textContent=t}else if(!l&&b._orig){b.textContent=b._orig;delete b._orig}}catch(x){}}
function sClass(s){if(!s)return'st-completed';if(String(s).charAt(0)==='ร')return'st-pending';if(s==='InProgress'||String(s).charAt(0)==='ก')return'st-progress';if(String(s).indexOf('ยก')>-1)return'st-canceled';return'st-completed'}
function sBadge(s){if(!s)return'<span class="badge-s bc">\u2705 เสร็จ</span>';if(String(s).charAt(0)==='ร')return'<span class="badge-s bp">\u23f3 รอ</span>';if(s==='InProgress'||String(s).charAt(0)==='ก')return'<span class="badge-s bi">\ud83d\udd04 ทำอยู่</span>';if(String(s).indexOf('ยก')>-1)return'<span class="badge-s be">\u274c ยก</span>';return'<span class="badge-s bc">\u2705 เสร็จ</span>'}

function renderChart(sm){try{if(typeof ApexCharts==='undefined')return;if(CHART){CHART.destroy();CHART=null}CHART=new ApexCharts(document.querySelector('#jobStatusChart'),{chart:{type:'donut',height:200,background:'transparent'},series:[sm.pending||0,sm.inProgress||0,sm.completed||0,sm.cancelled||0],labels:['\ud83d\udfe1 รอ','\ud83d\udd35 ทำอยู่','\ud83d\udfe3 เสร็จ','\ud83d\udd34 ยก'],colors:['#f59e0b','#3b82f6','#10b981','#ef4444'],stroke:{width:2,colors:['#0f172a']},legend:{position:'bottom',fontSize:'12px'},dataLabels:{enabled:false},plotOptions:{pie:{donut:{size:'65%',labels:{show:true,name:{fontSize:'12px',color:'#f1f5f9'},value:{fontSize:'24px',fontWeight:900,color:'#f1f5f9'},total:{show:true,label:'งานทั้งหมด',fontSize:'11px',color:'#94a3b8',formatter:function(){return(sm.pending+sm.inProgress+sm.completed+sm.cancelled).toString()}}}}}},tooltip:{theme:'dark',style:{fontSize:'13px'}}});CHART.render()}catch(x){}}

function renderSwiper(jobs){var w=document.getElementById('swiperWrapper'),em=document.getElementById('emptyJobs');if(!w)return;w.innerHTML='';if(!jobs||jobs.length===0){if(em)em.style.display='block';if(J_SWIPER){J_SWIPER.destroy();J_SWIPER=null}return}if(em)em.style.display='none';for(var i=0;i<jobs.length;i++){var j=jobs[i];if(!j||!j.id)continue;var s=document.createElement('div');s.className='swiper-slide';var c=document.createElement('div');c.className='job-swiper-card '+sClass(j.status);(function(xid){c.addEventListener('click',function(){viewJob(xid)})})(j.id);var h='<div class="d-flex justify-content-between align-items-center mb-1"><div class="d-flex align-items-center gap-2"><span class="job-id">'+esc(j.id)+'</span>'+sBadge(j.status)+'</div>';h+='<button class="btn btn-success btn-sm" style="padding:6px 12px;font-size:13px" onclick="event.stopPropagation();CURRENT_JOB_ID='+"'"+j.id+"'"+';showPhotoUploadModal()">\ud83d\udcf7</button></div>';h+='<div class="job-sname">'+esc(j.customer)+'</div>';if(j.symptom)h+='<div class="job-ssymp">'+esc(j.symptom)+'</div>';h+='<div class="job-smeta"><span>\ud83d\udd27 '+esc(j.tech||'-')+'</span>';if(j.created)h+='<span>\ud83d\udd50 '+j.created+'</span></div>';c.innerHTML=h;s.appendChild(c);w.appendChild(s)}if(J_SWIPER)J_SWIPER.destroy();try{J_SWIPER=new Swiper('.jobSwiper',{slidesPerView:'auto',centeredSlides:true,spaceBetween:12,grabCursor:true,pagination:{el:'.swiper-pagination',clickable:true,dynamicBullets:true}})}catch(x){}}

function renderDashboard(d){try{var sm=(d&&d.summary)||{},jb=(d&&d.jobs)||[],iv=(d&&d.inventory)||[];JOBS=jb;INVENTORY=iv;ALL_JOBS=jb.slice(0,50);if(sm.date){var ck=document.getElementById('clock');if(ck)ck.textContent=sm.date}var pp=sm.pendingPhotos||0,pc=document.getElementById('photoCard');if(pc){pc.style.display='block';if(pp>0){pc.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:28px;font-weight:900;color:var(--purple)">'+pp+'</div><div style="font-size:14px;color:var(--t2)">รูปที่รอจัด</div></div><button onclick="processPhotos()" class="btn btn-purple btn-lg" style="width:auto;padding:12px 20px;font-size:15px">\u23d9 จัดรูป</button></div>'}else{pc.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:24px;font-weight:900;color:var(--cyan)">0</div><div style="font-size:14px;color:var(--t2)">เรียบร้อย \u2705</div></div><button onclick="processPhotos()" class="btn btn-cyan btn-lg" style="width:auto;padding:12px 20px;font-size:15px">\ud83e\udd16 ตรวจตามรูป</button></div>'}}var tks={};for(var i=0;i<Math.min(jb.length,50);i++){var _j=jb[i];if(!_j)continue;var jt=_j.tech;if(jt&&jt!=='-'&&jt!=='null'&&jt!=='undefined')tks[jt]=1}var ft=document.getElementById('ft');if(ft){var o='<option value="">ช่างทั้งหมด</option>',k=Object.keys(tks);for(var ki=0;ki<k.length;ki++)o+='<option value="'+esc(k[ki])+'">'+esc(k[ki])+'</option>';ft.innerHTML=o}renderSwiper(ALL_JOBS);var il=document.getElementById('inventoryList');if(il){var ih='';for(var ii=0;ii<Math.min(iv.length,20);ii++){var it=iv[ii];if(!it)continue;var qc=it.alert?'lo':'ok';ih+='<div class="inv-item"><div><div class="inv-name">'+esc(it.name||'?')+'</div><div class="inv-code">'+esc(it.code||'-')+'</div></div><span class="inv-qty '+qc+'">'+(it.qty!=null?it.qty:'-')+'</span></div>'}il.innerHTML=ih||'<div class="empty-state" style="padding:20px">ไม่มีข้อมูล</div>'}showContent();setTimeout(function(){renderChart(sm)},300)}catch(x){showError('Render error',x.message)}}

function filterJobs(){try{var si=document.getElementById('fs'),ftE=document.getElementById('ft'),fst=document.getElementById('fst');if(!si||!ftE||!fst)return;var q=(si.value||'').toLowerCase(),t=(ftE.value||'').toLowerCase(),s=fst.value||'';var f=ALL_JOBS.filter(function(j){if(!j||!j.id)return false;if(q){var cc=String(j.customer||'').toLowerCase(),cj=String(j.id||'').toLowerCase(),cs=String(j.symptom||'').toLowerCase();if(cc.indexOf(q)===-1&&cj.indexOf(q)===-1&&cs.indexOf(q)===-1)return false}if(t&&String(j.tech||'').toLowerCase()!==t)return false;if(s&&String(j.status||'')!==s)return false;return true});renderSwiper(f.length>0?f:ALL_JOBS);i
