name: Auto Backup & Daily Tag

on:
  push:
    branches: [ main ]
  schedule:
    # ทำงานทุกวัน 02:00 UTC = 09:00 น. เวลาไทย
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set backup date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create daily backup tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="backup-${{ steps.date.outputs.DATE }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Daily backup: ${{ steps.date.outputs.DATE }}"
            git push origin "$TAG"
            echo "Created backup tag: $TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Backup summary
        run: |
          echo "## Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** ${{ steps.date.outputs.DATE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Backup tag created successfully" >> $GITHUB_STEP_SUMMARY
