<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMPHONE POS - ขายหน้าร้าน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Sarabun', sans-serif; }
    .pos-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .product-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
    .product-card:hover { transform: translateY(-5px); }
    .cart-item { background: white; border-radius: 8px; padding: 10px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .total-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; padding: 20px; }
  </style>
</head>
<body>
  <div class="pos-container">
    <h1 class="text-center mb-4">🛒 COMPHONE POS - ขายหน้าร้าน</h1>
    
    <div class="row">
      <!-- Product Selection -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">เลือกสินค้า</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <input type="text" class="form-control" id="searchProduct" placeholder="ค้นหาสินค้า...">
            </div>
            <div class="product-grid" id="productGrid">
              <!-- Products will be loaded here -->
            </div>
          </div>
        </div>
      </div>

      <!-- Shopping Cart -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">🛒 ตะกร้าสินค้า</h5>
          </div>
          <div class="card-body">
            <div id="cartItems">
              <p class="text-muted">ยังไม่มีสินค้าในตะกร้า</p>
            </div>
            <hr>
            <div class="total-box">
              <h3>ยอดรวม: ฿<span id="totalAmount">0</span></h3>
              <p class="mb-0">VAT 7%: ฿<span id="vatAmount">0</span></p>
              <h4>ยอดสุทธิ: ฿<span id="grandTotal">0</span></h4>
            </div>
            
            <div class="mt-3">
              <label class="form-label">วิธีชำระเงิน</label>
              <select class="form-select" id="paymentMethod">
                <option value="cash">เงินสด</option>
                <option value="promptpay">พร้อมเพย์</option>
                <option value="card">บัตรเครดิต</option>
              </select>
            </div>
            
            <div class="mt-3">
              <label class="form-label">ชื่อลูกค้า (ไม่บังคับ)</label>
              <input type="text" class="form-control" id="customerName" placeholder="ชื่อลูกค้า">
            </div>
            
            <button class="btn btn-primary w-100 mt-3" onclick="processSale()">
              <i class="bi bi-check-circle"></i> ทำรายการขาย
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="gas_config.js"></script>
  <script src="execution_lock.js"></script>
  <script src="api_client.js"></script>
  <script src="smart_quotation.js"></script>
  <script src="pos.js"></script>
</body>
</html>
