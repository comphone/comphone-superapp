<!-- COMPHONE SUPER APP V5.5 -->
<script>
(function (window, document, api) {
  'use strict';

  if (!api) return;

  var APP = api.APP;

  function normalizeAlertItems(payload) {
    if (!payload) return [];
    if (Array.isArray(payload)) return payload;
    if (Array.isArray(payload.items)) return payload.items;
    if (Array.isArray(payload.alerts)) return payload.alerts;
    return [];
  }

  function normalizeJob(job) {
    job = job || {};
    var photos = api.normalizePhotoList(job.photo_urls || job.photos || job.gallery || job.photoLinks);
    return {
      id: String(job.id || job.job_id || ''),
      customer: String(job.customer || job.customer_name || job.name || '-'),
      customerId: String(job.customer_id || ''),
      symptom: String(job.symptom || job.issue || job.description || '-'),
      tech: String(job.tech || job.technician || '-'),
      statusLabel: api.getStatusLabel(job.status || job.status_label || job.current_status || job.current_status_code || '-'),
      statusCode: String(job.current_status_code || job.status_code || ''),
      createdAt: job.created_at || job.created || job.date || '',
      updatedAt: job.updated_at || job.updated || '',
      appointmentAt: job.appointment_at || job.appointment || job.due_at || '',
      folderUrl: String(job.folder || job.folder_url || ''),
      note: String(job.note || ''),
      photos: photos,
      photoCount: Number(job.photo_count || photos.length || 0),
      raw: job
    };
  }

  function dedupeJobs(items) {
    var seen = {};
    var out = [];
    (items || []).forEach(function (item) {
      var normalized = normalizeJob(item);
      if (!normalized.id || seen[normalized.id]) return;
      seen[normalized.id] = true;
      out.push(normalized);
    });
    return out;
  }

  function collectTechnicians() {
    var bucket = {};
    (APP.jobs || []).forEach(function (job) {
      var name = String(job.tech || '').trim();
      if (!name || name === '-') return;
      bucket[name] = true;
    });
    APP.technicians = Object.keys(bucket).sort(function (a, b) { return a.localeCompare(b, 'th'); });
    if (APP.ui.newJobTech) {
      var html = '<option value="">ยังไม่กำหนด</option>';
      APP.technicians.forEach(function (name) {
        html += '<option value="' + api.escapeHtml(name) + '">' + api.escapeHtml(name) + '</option>';
      });
      APP.ui.newJobTech.innerHTML = html;
    }
  }

  function renderSummary() {
    var summary = APP.summary || {};
    var revenue = summary.revenue || {};
    var topTech = summary.topTechnician || summary.top_technician || {};
    var alerts = normalizeAlertItems(APP.alerts || summary.alerts || []);

    api.setText(APP.ui.apiMode, APP.config.apiBaseUrl ? 'GAS Web App Ready' : 'google.script.run');
    api.setText(APP.ui.lastSync, summary.lastUpdated || summary.updated_at || summary.generatedAt || summary.generated_at || 'พร้อมใช้งาน');
    api.setText(APP.ui.topTech, topTech.name ? topTech.name + ' (' + api.formatNumber(topTech.jobs || topTech.count || 0) + ')' : '-');
    api.setText(APP.ui.pendingPhotos, api.formatNumber(summary.pendingPhotos || summary.pending_photos || 0));
    api.setText(APP.ui.openAlerts, api.formatNumber(alerts.length));
    api.setText(APP.ui.totalJobs, api.formatNumber(summary.totalJobs || summary.total_jobs || APP.jobs.length || 0));
    api.setText(APP.ui.lowStock, api.formatNumber(summary.lowStock || summary.low_stock || 0));
    api.setText(APP.ui.overdueJobs, api.formatNumber(summary.overdueJobs || summary.overdue_jobs || 0));
    api.setText(APP.ui.pmCustomers, api.formatNumber(summary.pmDueCount || summary.pm_due_count || summary.pmCustomers || 0));
    api.setText(APP.ui.revToday, api.formatCurrency(revenue.today || summary.revToday || 0));
    api.setText(APP.ui.revWeek, api.formatCurrency(revenue.week || summary.revWeek || 0));
    api.setText(APP.ui.revMonth, api.formatCurrency(revenue.month || summary.revMonth || 0));
  }

  function buildStatusDistributionLookup() {
    var lookup = {};
    (APP.summary.status_distribution || APP.summary.statusDistribution || []).forEach(function (item) {
      if (!item) return;
      if (item.code !== undefined && item.code !== null) lookup[String(item.code)] = Number(item.count || 0);
      if (item.label) lookup[String(item.label)] = Number(item.count || 0);
      if (item.status) lookup[String(item.status)] = Number(item.count || 0);
    });
    return lookup;
  }

  function renderStatusGrid() {
    if (!APP.ui.statusGrid) return;
    var lookup = buildStatusDistributionLookup();
    var activeStatus = APP.filters.status || 'ALL';
    var html = '';
    (APP.statusConfig || []).forEach(function (state) {
      var label = String(state.label || '-');
      var count = Number(lookup[String(state.code)] || lookup[label] || 0);
      var activeClass = activeStatus === label ? ' is-active' : '';
      var tone = api.getStatusAppearance(label);
      html += '<button type="button" class="status-chip ' + tone + activeClass + '" data-status-label="' + api.escapeHtml(label) + '">';
      html += '<span>' + api.escapeHtml(label) + '</span>';
      html += '<small>' + api.formatNumber(count) + '</small>';
      html += '</button>';
    });
    APP.ui.statusGrid.innerHTML = html;
  }

  function renderAlerts() {
    if (!APP.ui.alertsList) return;
    var items = normalizeAlertItems(APP.alerts || APP.summary.alerts || []).slice(0, 3);
    if (!items.length) {
      APP.ui.alertsList.innerHTML = '<li class="alert-item"><div><div class="job-id">ไม่มีแจ้งเตือนสำคัญ</div><div class="job-meta">ระบบพร้อมใช้งาน</div></div></li>';
      return;
    }

    var html = '';
    items.forEach(function (item) {
      html += '<li class="alert-item">';
      html += '<div class="alert-top">';
      html += '<div class="job-id">' + api.escapeHtml(String(item.title || item.name || item.category || 'Alert')) + '</div>';
      html += '<div class="status-pill">' + api.escapeHtml(String(item.priority || item.level || 'info')) + '</div>';
      html += '</div>';
      html += '<div class="job-meta">' + api.escapeHtml(String(item.detail || item.message || item.description || '-')) + '</div>';
      if (item.value !== undefined && item.value !== null && item.value !== '') {
        html += '<div class="muted-text">ค่าปัจจุบัน: ' + api.escapeHtml(String(item.value)) + '</div>';
      }
      html += '</li>';
    });
    APP.ui.alertsList.innerHTML = html;
  }

  function getFilteredJobs() {
    var query = String(APP.filters.query || '').trim().toLowerCase();
    var status = String(APP.filters.status || 'ALL');
    var mode = String(APP.filters.mode || 'ALL');
    return (APP.jobs || []).filter(function (job) {
      if (status !== 'ALL' && job.statusLabel !== status) return false;
      if (mode === 'OVERDUE' && !job.raw.is_overdue && !job.raw.overdue) return false;
      if (mode === 'PM_DUE' && !job.raw.is_pm_due && !job.raw.pm_due) return false;
      if (query) {
        var haystack = [job.id, job.customer, job.symptom, job.tech, job.statusLabel].join(' ').toLowerCase();
        if (haystack.indexOf(query) === -1) return false;
      }
      return true;
    });
  }

  function buildJobCard(job) {
    var thumb = job.photos && job.photos[0]
      ? '<div class="job-card-thumb"><img src="' + api.escapeHtml(job.photos[0]) + '" alt="' + api.escapeHtml(job.id) + '"></div>'
      : '<div class="job-card-thumb">NO PHOTO</div>';
    var appointment = job.appointmentAt ? api.formatDateTime(job.appointmentAt) : 'ยังไม่กำหนดวันนัด';
    return '' +
      '<button type="button" class="job-card" data-job-id="' + api.escapeHtml(job.id) + '">' +
        '<div class="job-card-top">' +
          '<div style="display:flex; gap:12px; min-width:0;">' + thumb +
            '<div class="job-card-main">' +
              '<div class="job-id">' + api.escapeHtml(job.id) + '</div>' +
              '<div class="job-customer">' + api.escapeHtml(job.customer) + '</div>' +
              '<div class="job-desc">' + api.escapeHtml(job.symptom) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="status-pill">' + api.escapeHtml(job.statusLabel) + '</div>' +
        '</div>' +
        '<div class="job-status-row">' +
          '<span class="meta-pill">ช่าง: ' + api.escapeHtml(job.tech || '-') + '</span>' +
          '<span class="meta-pill">วันนัด: ' + api.escapeHtml(appointment) + '</span>' +
          '<span class="meta-pill">รูป: ' + api.formatNumber(job.photoCount || 0) + '</span>' +
        '</div>' +
      '</button>';
  }

  function renderRecentJobs() {
    if (!APP.ui.recentJobs) return;
    var jobs = getFilteredJobs();
    if (APP.ui.jobResultMeta) {
      APP.ui.jobResultMeta.textContent = 'พบ ' + api.formatNumber(jobs.length) + ' งาน';
    }
    if (!jobs.length) {
      APP.ui.recentJobs.innerHTML = '<div class="empty-state">ไม่พบงานตามตัวกรองปัจจุบัน</div>';
      return;
    }
    APP.ui.recentJobs.innerHTML = jobs.map(buildJobCard).join('');
  }

  function buildCalendarEvents() {
    return (APP.jobs || []).filter(function (job) {
      return !!api.toDate(job.appointmentAt);
    }).map(function (job) {
      var statusClass = api.getStatusAppearance(job.statusLabel);
      var colorMap = {
        'priority-good': '#22c55e',
        'priority-medium': '#f59e0b',
        'priority-danger': '#ef4444',
        'priority-info': '#38bdf8',
        'priority-muted': '#94a3b8'
      };
      return {
        id: job.id,
        title: job.id + ' • ' + job.customer,
        start: api.toDate(job.appointmentAt),
        allDay: false,
        backgroundColor: colorMap[statusClass] || '#38bdf8',
        borderColor: colorMap[statusClass] || '#38bdf8',
        extendedProps: {
          jobId: job.id,
          customer: job.customer,
          symptom: job.symptom,
          technician: job.tech,
          statusLabel: job.statusLabel
        }
      };
    });
  }

  function renderCalendarPool() {
    if (!APP.ui.calendarJobsPool) return;
    var poolJobs = (APP.jobs || []).filter(function (job) {
      return !api.toDate(job.appointmentAt);
    }).slice(0, 18);

    if (!poolJobs.length) {
      APP.ui.calendarJobsPool.innerHTML = '<div class="empty-state">ไม่มีงานที่รอลงวันนัด</div>';
      return;
    }

    var html = '';
    poolJobs.forEach(function (job) {
      html += '<div class="pool-job" data-job-id="' + api.escapeHtml(job.id) + '" data-event="{&quot;title&quot;:&quot;' + api.escapeHtml(job.id + ' • ' + job.customer).replace(/&quot;/g, '\\&quot;') + '&quot;,&quot;duration&quot;:&quot;01:00&quot;}">';
      html += '<div class="job-id">' + api.escapeHtml(job.id) + '</div>';
      html += '<div class="job-meta">' + api.escapeHtml(job.customer) + '</div>';
      html += '<div class="job-meta">' + api.escapeHtml(job.tech || 'ยังไม่กำหนดช่าง') + '</div>';
      html += '</div>';
    });
    APP.ui.calendarJobsPool.innerHTML = html;

    if (window.FullCalendar && window.FullCalendar.Draggable) {
      new window.FullCalendar.Draggable(APP.ui.calendarJobsPool, {
        itemSelector: '.pool-job',
        eventData: function (eventEl) {
          var jobId = eventEl.getAttribute('data-job-id') || '';
          var found = (APP.jobs || []).filter(function (job) { return job.id === jobId; })[0];
          return {
            id: jobId,
            title: (found ? found.id + ' • ' + found.customer : jobId),
            duration: '01:00',
            extendedProps: {
              jobId: jobId
            }
          };
        }
      });
    }
  }

  async function saveJobSchedule(jobId, date) {
    if (!jobId || !date) return;
    var payload = {
      job_id: jobId,
      appointment_at: date instanceof Date ? date.toISOString() : String(date)
    };
    var result = await api.callServer('updateJobScheduleV55', [payload]);
    if (result && result.success === false) throw new Error(result.error || 'บันทึกวันนัดไม่สำเร็จ');
  }

  function ensureCalendar() {
    if (!APP.ui.calendarView || !window.FullCalendar) return;
    APP.calendarEvents = buildCalendarEvents();
    if (APP.calendar) {
      APP.calendar.removeAllEvents();
      APP.calendar.addEventSource(APP.calendarEvents);
      APP.calendar.updateSize();
      return;
    }

    APP.calendar = new window.FullCalendar.Calendar(APP.ui.calendarView, {
      locale: 'th',
      initialView: 'listWeek',
      height: 'auto',
      editable: true,
      droppable: true,
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'listWeek,dayGridMonth,timeGridWeek'
      },
      views: {
        listWeek: { buttonText: 'List' },
        dayGridMonth: { buttonText: 'Month' },
        timeGridWeek: { buttonText: 'Week' }
      },
      eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
      events: APP.calendarEvents,
      eventClick: function (info) {
        info.jsEvent.preventDefault();
        if (window.COMPHONE_V55_INTERACTIONS && typeof window.COMPHONE_V55_INTERACTIONS.openJobDetail === 'function') {
          window.COMPHONE_V55_INTERACTIONS.openJobDetail(info.event.id || info.event.extendedProps.jobId || '');
        }
      },
      eventDrop: async function (info) {
        try {
          await saveJobSchedule(info.event.id || info.event.extendedProps.jobId || '', info.event.start);
          api.toast('อัปเดตวันนัดแล้ว', 'success');
          await fetchDashboardData({ silent: true });
        } catch (error) {
          info.revert();
          api.toast('เปลี่ยนวันนัดไม่สำเร็จ: ' + (error.message || error), 'error');
        }
      },
      eventReceive: async function (info) {
        try {
          await saveJobSchedule(info.event.id || info.event.extendedProps.jobId || '', info.event.start);
          api.toast('เพิ่มงานลงปฏิทินแล้ว', 'success');
          await fetchDashboardData({ silent: true });
        } catch (error) {
          info.revert();
          api.toast('เพิ่มวันนัดไม่สำเร็จ: ' + (error.message || error), 'error');
        }
      }
    });

    APP.calendar.render();
  }

  function renderStatusFilter() {
    if (!APP.ui.statusFilter) return;
    var value = APP.filters.status || 'ALL';
    var html = '<option value="ALL">ทุกสถานะ</option>';
    (APP.statusConfig || []).forEach(function (state) {
      var label = String(state.label || '');
      html += '<option value="' + api.escapeHtml(label) + '">' + api.escapeHtml(label) + '</option>';
    });
    APP.ui.statusFilter.innerHTML = html;
    APP.ui.statusFilter.value = value;
  }

  async function fetchStatusConfig() {
    var result = await api.callServer('getJobStateConfig');
    if (!result || result.success === false) throw new Error(result && result.error ? result.error : 'โหลดสถานะงานไม่สำเร็จ');
    APP.statusConfig = result.states || [];
    renderStatusFilter();
  }

  async function fetchDashboardData(options) {
    options = options || {};
    try {
      api.setText(APP.ui.apiMode, options.silent ? 'กำลังซิงก์...' : 'กำลังโหลด...');
      var result;
      try {
        result = await api.callServer('getDashboardPayloadV55');
      } catch (customError) {
        result = await api.callServer('getDashboardData');
      }

      if (!result || result.success === false) throw new Error(result && result.error ? result.error : 'โหลดข้อมูล dashboard ไม่สำเร็จ');

      APP.dashboard = result;
      APP.summary = result.summary || result.dashboard || {};
      APP.alerts = normalizeAlertItems(result.alerts || APP.summary.alerts || []);
      APP.jobs = dedupeJobs(result.jobs || APP.summary.recentJobs || APP.summary.jobs || []);
      collectTechnicians();
      renderSummary();
      renderStatusGrid();
      renderAlerts();
      renderRecentJobs();
      renderCalendarPool();
      ensureCalendar();
      api.setText(APP.ui.apiMode, 'Dashboard Online');
      if (!options.silent) api.toast('โหลด Dashboard V5.5 สำเร็จ', 'success');
      return result;
    } catch (error) {
      api.setText(APP.ui.apiMode, 'โหลดข้อมูลไม่สำเร็จ');
      if (!options.silent) api.toast('โหลดข้อมูลไม่สำเร็จ: ' + (error.message || error), 'error');
      throw error;
    }
  }

  async function initializeDashboard() {
    api.ensureUiRefs();
    await fetchStatusConfig();
    await fetchDashboardData();
  }

  window.COMPHONE_V55_DASHBOARD = {
    initializeDashboard: initializeDashboard,
    fetchDashboardData: fetchDashboardData,
    fetchStatusConfig: fetchStatusConfig,
    renderRecentJobs: renderRecentJobs,
    renderStatusGrid: renderStatusGrid,
    ensureCalendar: ensureCalendar,
    getFilteredJobs: getFilteredJobs,
    normalizeJob: normalizeJob
  };
})(window, document, window.comphoneV55);
</script>
