<!-- COMPHONE SUPER APP V5.5 -->
<!-- Design note: Rendering layer for a compact executive dashboard; prioritize above-the-fold KPIs, touch-friendly status cards, and mobile job cards. -->
<script>
(function (window, document, api) {
  'use strict';

  if (!api) return;

  var APP = api.APP;

  function resolveAlertCount(alertsPayload) {
    if (!alertsPayload) return 0;
    if (Array.isArray(alertsPayload)) return alertsPayload.length;
    if (Array.isArray(alertsPayload.items)) return alertsPayload.items.length;
    return Number(alertsPayload.total || 0) || 0;
  }

  function getInvoiceCount(report) {
    report = report || {};
    return Number(report.bill_count || report.count || report.total_bills || 0) || 0;
  }

  function getRefreshLabel(summary) {
    var candidate = summary && (summary.lastUpdated || summary.updated_at || summary.generatedAt || summary.date);
    if (!candidate) return 'พร้อมใช้งาน';
    return String(candidate);
  }

  function renderTopSummary(summary, alertsPayload) {
    summary = summary || {};
    var revenue = summary.revenue || {};
    var topTech = summary.topTechnician || {};

    api.setText(APP.ui.apiBasePreview, APP.config.apiBaseUrl || 'google.script.run / Router.gs V5.5');
    api.setText(APP.ui.lastRefreshText, getRefreshLabel(summary));
    api.setText(APP.ui.topTechnicianText, topTech.name ? topTech.name + ' (' + api.formatNumber(topTech.jobs || topTech.count || 0) + ')' : '-');
    api.setText(APP.ui.pendingPhotosText, api.formatNumber(summary.pendingPhotos || 0));
    api.setText(APP.ui.openAlertsText, api.formatNumber(resolveAlertCount(alertsPayload || summary.alerts || [])));

    api.setText(APP.ui.metricTotalJobs, api.formatNumber(summary.totalJobs || 0));
    api.setText(APP.ui.metricLowStock, api.formatNumber(summary.lowStock || 0));
    api.setText(APP.ui.metricOverdueJobs, api.formatNumber(summary.overdueJobs || 0));
    api.setText(APP.ui.metricPmDue, api.formatNumber(summary.pmDueCount || 0));

    api.setText(APP.ui.revenueToday, api.formatCurrency(revenue.today || 0));
    api.setText(APP.ui.revenueWeek, api.formatCurrency(revenue.week || 0));
    api.setText(APP.ui.revenueMonth, api.formatCurrency(revenue.month || 0));

    api.setText(APP.ui.revenueTodayMeta, api.formatNumber(getInvoiceCount(APP.dashboard && APP.dashboard.revenue_today)) + ' บิล');
    api.setText(APP.ui.revenueWeekMeta, api.formatNumber(getInvoiceCount(APP.dashboard && APP.dashboard.revenue_week)) + ' บิล');
    api.setText(APP.ui.revenueMonthMeta, api.formatNumber(getInvoiceCount(APP.dashboard && APP.dashboard.revenue_month)) + ' บิล');
  }

  function renderStatusFilter() {
    var select = APP.ui.statusFilterSelect;
    if (!select) return;

    var currentValue = APP.filters.status || 'ALL';
    var html = '<option value="ALL">ทุกสถานะ</option>';
    (APP.statusConfig || []).forEach(function (item) {
      var label = String(item.label || '');
      html += '<option value="' + api.escapeHtml(label) + '">' + api.escapeHtml(label) + '</option>';
    });
    select.innerHTML = html;

    var hasCurrent = currentValue === 'ALL' || (APP.statusConfig || []).some(function (item) {
      return String(item.label || '') === currentValue;
    });
    select.value = hasCurrent ? currentValue : 'ALL';
  }

  function formatAllowedNext(items) {
    if (!items || !items.length) return 'สิ้นสุดกระบวนการ';
    return items.map(function (item) {
      return item && item.label ? item.label : '-';
    }).join(' / ');
  }

  function renderStatusBoard() {
    var summary = APP.summary || {};
    var board = APP.ui.statusBoard;
    var loading = APP.ui.statusBoardLoading;
    var errorBox = APP.ui.statusBoardError;
    if (!board) return;

    api.hide(errorBox);
    api.hide(loading);

    var lookup = api.toStatusCodeLookup(summary.status_distribution || []);
    var items = APP.statusConfig || [];
    if (!items.length) {
      api.setText(errorBox, 'ไม่พบข้อมูลสถานะจาก JobStateMachine V5.5');
      api.show(errorBox);
      api.hide(board);
      return;
    }

    var activeStatus = String(APP.filters.status || 'ALL');
    var html = '';
    items.forEach(function (state) {
      var label = String(state.label || '-');
      var count = Number(lookup[String(state.code)] || lookup[label] || 0) || 0;
      var isActive = activeStatus !== 'ALL' && activeStatus === label;
      var style = isActive ? ' style="border-color:rgba(88,208,255,0.34);background:linear-gradient(180deg, rgba(18,38,62,0.98), rgba(10,21,36,0.98));box-shadow:0 20px 36px rgba(2,12,24,.26);"' : '';

      html += '<article class="status-card"' + style + ' data-status-code="' + api.escapeHtml(String(state.code)) + '" data-status-label="' + api.escapeHtml(label) + '">';
      html += '<div class="status-chip-row">';
      html += '<span class="status-badge">Step ' + api.escapeHtml(String(state.code)) + '</span>';
      if (isActive) html += '<span class="status-badge" style="color:#86ddff;border-color:rgba(88,208,255,0.18);">กำลังกรอง</span>';
      html += '</div>';
      html += '<div class="status-name">' + api.escapeHtml(label) + '</div>';
      html += '<div class="status-count">' + api.formatNumber(count) + '</div>';
      html += '<div class="status-meta">ถัดไป: ' + api.escapeHtml(formatAllowedNext(state.allowed_next)) + '</div>';
      html += '</article>';
    });

    board.innerHTML = html;
    api.show(board);
    api.setText(APP.ui.statusTotalText, api.formatNumber(items.length) + ' สถานะพร้อมใช้งาน');
  }

  function normalizeAlertItems(payload) {
    if (!payload) return [];
    if (Array.isArray(payload)) return payload;
    if (Array.isArray(payload.items)) return payload.items;
    return [];
  }

  function renderAlerts() {
    var items = normalizeAlertItems((APP.dashboard && APP.dashboard.alerts) || (APP.summary && APP.summary.alerts) || []);
    var wrap = APP.ui.alertsList;
    if (!wrap) return;

    api.setText(APP.ui.alertsCounterPill, api.formatNumber(items.length) + ' รายการ');
    if (!items.length) {
      wrap.innerHTML = '';
      api.show(APP.ui.alertsEmpty);
      return;
    }

    api.hide(APP.ui.alertsEmpty);
    var html = '';
    items.forEach(function (item) {
      var tone = item.priority || item.level || 'info';
      var toneClass = tone === 'high' ? 'priority-high' : tone === 'medium' ? 'priority-medium' : 'priority-info';
      html += '<article class="alert-item">';
      html += '<div class="alert-item-header">';
      html += '<h3 class="alert-title">' + api.escapeHtml(String(item.title || item.name || 'Alert')) + '</h3>';
      html += '<span class="alert-tag ' + toneClass + '">' + api.escapeHtml(String(item.category || tone || 'info')) + '</span>';
      html += '</div>';
      html += '<div class="alert-detail">' + api.escapeHtml(String(item.detail || item.message || item.description || '-')) + '</div>';
      if (item.value !== undefined && item.value !== null && item.value !== '') {
        html += '<div class="muted">ค่าปัจจุบัน: ' + api.escapeHtml(String(item.value)) + '</div>';
      }
      html += '</article>';
    });
    wrap.innerHTML = html;
  }

  function normalizeJob(job) {
    job = job || {};
    return {
      id: String(job.id || job.job_id || ''),
      customer: String(job.customer || job.customer_name || job.name || '-'),
      symptom: String(job.symptom || job.issue || job.description || '-'),
      tech: String(job.tech || job.technician || '-'),
      status: api.getStatusLabel(job.status || job.status_label || job.current_status || job.current_status_code || '-'),
      created: api.formatDateTime(job.created || job.created_at || job.date || '-'),
      folder: String(job.folder || job.folder_url || ''),
      raw: job
    };
  }

  function getFilteredJobs() {
    var query = String(APP.filters.query || '').trim().toLowerCase();
    var status = String(APP.filters.status || 'ALL');
    var limit = Number(APP.filters.limit || 20) || 20;
    var list = (APP.jobs || []).map(normalizeJob).filter(function (job) {
      if (status !== 'ALL' && job.status !== status) return false;
      if (!query) return true;
      var haystack = [job.id, job.customer, job.symptom, job.tech, job.status].join(' ').toLowerCase();
      return haystack.indexOf(query) > -1;
    });
    return list.slice(0, limit);
  }

  function renderRecentJobs() {
    var jobs = getFilteredJobs();
    var tbody = APP.ui.recentJobsTableBody;
    var mobileList = APP.ui.recentJobsMobileList;
    if (!tbody || !mobileList) return;

    api.hide(APP.ui.recentJobsLoading);
    api.hide(APP.ui.recentJobsError);
    api.setText(APP.ui.recentJobsCounter, api.formatNumber(jobs.length) + ' รายการ');

    if (!jobs.length) {
      tbody.innerHTML = '';
      mobileList.innerHTML = '';
      api.hide(APP.ui.recentJobsTableWrap);
      api.hide(APP.ui.recentJobsTable);
      api.hide(APP.ui.recentJobsMobileList);
      api.show(APP.ui.recentJobsEmpty);
      return;
    }

    api.hide(APP.ui.recentJobsEmpty);
    api.show(APP.ui.recentJobsTableWrap);
    api.show(APP.ui.recentJobsTable);
    api.show(APP.ui.recentJobsMobileList);

    var tableHtml = '';
    var mobileHtml = '';

    jobs.forEach(function (job) {
      var badgeClass = api.getStatusAppearance(job.status);

      tableHtml += '<tr data-job-id="' + api.escapeHtml(job.id) + '" class="job-row">';
      tableHtml += '<td><strong>' + api.escapeHtml(job.id) + '</strong></td>';
      tableHtml += '<td>' + api.escapeHtml(job.customer) + '</td>';
      tableHtml += '<td>' + api.escapeHtml(job.symptom) + '</td>';
      tableHtml += '<td>' + api.escapeHtml(job.tech) + '</td>';
      tableHtml += '<td><span class="alert-tag ' + badgeClass + '">' + api.escapeHtml(job.status) + '</span></td>';
      tableHtml += '<td>' + api.escapeHtml(job.created) + '</td>';
      tableHtml += '</tr>';

      mobileHtml += '<article class="mobile-job-card" data-job-id="' + api.escapeHtml(job.id) + '">';
      mobileHtml += '<div class="job-card-header">';
      mobileHtml += '<div>';
      mobileHtml += '<h3 class="job-card-title">' + api.escapeHtml(job.id) + '</h3>';
      mobileHtml += '<div class="job-card-customer">' + api.escapeHtml(job.customer) + '</div>';
      mobileHtml += '</div>';
      mobileHtml += '<span class="alert-tag ' + badgeClass + '">' + api.escapeHtml(job.status) + '</span>';
      mobileHtml += '</div>';
      mobileHtml += '<div class="job-card-text">' + api.escapeHtml(job.symptom) + '</div>';
      mobileHtml += '<div class="job-card-meta">';
      mobileHtml += '<span class="soft-chip">ช่าง: ' + api.escapeHtml(job.tech) + '</span>';
      mobileHtml += '<span class="soft-chip">สร้าง: ' + api.escapeHtml(job.created) + '</span>';
      mobileHtml += '</div>';
      mobileHtml += '</article>';
    });

    tbody.innerHTML = tableHtml;
    mobileList.innerHTML = mobileHtml;
  }

  function setLoadingState(isLoading) {
    if (APP.ui.systemStatusBadge) {
      APP.ui.systemStatusBadge.textContent = isLoading ? 'กำลังซิงก์ข้อมูล...' : 'Dashboard Online';
    }
    if (APP.ui.refreshDashboardBtn) APP.ui.refreshDashboardBtn.disabled = !!isLoading;
    if (APP.ui.refreshDashboardBtnBottom) APP.ui.refreshDashboardBtnBottom.disabled = !!isLoading;
    if (APP.ui.recentJobsLoading) {
      if (isLoading) api.show(APP.ui.recentJobsLoading); else api.hide(APP.ui.recentJobsLoading);
    }
    if (APP.ui.statusBoardLoading) {
      if (isLoading) api.show(APP.ui.statusBoardLoading); else api.hide(APP.ui.statusBoardLoading);
    }
  }

  async function fetchStatusConfig() {
    var result = await api.callServer('getJobStateConfig');
    if (!result || result.success === false) {
      throw new Error(result && result.error ? result.error : 'ไม่สามารถโหลด JobStateMachine ได้');
    }
    APP.statusConfig = result.states || [];
    renderStatusFilter();
  }

  async function fetchDashboardData() {
    var result = await api.callServer('getDashboardData');
    if (!result || result.success === false) {
      throw new Error(result && result.error ? result.error : 'ไม่สามารถโหลดข้อมูล dashboard ได้');
    }

    APP.dashboard = result;
    APP.summary = result.summary || {};
    APP.jobs = result.jobs || APP.summary.recentJobs || APP.summary.jobs || [];
    APP.inventory = result.inventory || [];

    renderTopSummary(APP.summary, result.alerts);
    renderStatusBoard();
    renderAlerts();
    renderRecentJobs();
  }

  async function initializeDashboard() {
    api.ensureUiRefs();
    setLoadingState(true);
    try {
      await fetchStatusConfig();
      await fetchDashboardData();
      api.toast('โหลดข้อมูล V5.5 สำเร็จ', 'success');
    } catch (error) {
      var message = error && error.message ? error.message : String(error);
      if (APP.ui.statusBoardError) {
        api.setText(APP.ui.statusBoardError, message);
        api.show(APP.ui.statusBoardError);
      }
      if (APP.ui.recentJobsError) {
        api.setText(APP.ui.recentJobsError, message);
        api.show(APP.ui.recentJobsError);
      }
      api.toast('โหลดข้อมูลไม่สำเร็จ: ' + message, 'error');
    } finally {
      setLoadingState(false);
    }
  }

  window.COMPHONE_V55_DASHBOARD = {
    initializeDashboard: initializeDashboard,
    renderRecentJobs: renderRecentJobs,
    getFilteredJobs: getFilteredJobs,
    fetchDashboardData: fetchDashboardData,
    fetchStatusConfig: fetchStatusConfig,
    renderStatusBoard: renderStatusBoard
  };
})(window, document, window.comphoneV55);
</script>
