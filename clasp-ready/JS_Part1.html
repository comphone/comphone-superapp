<!-- COMPHONE SUPER APP V5.5 -->
<script>
(function (window, document) {
  'use strict';

  var APP = window.COMPHONE_V55_APP = {
    version: 'COMPHONE SUPER APP V5.5',
    config: window.COMPHONE_V55 || {},
    dashboard: null,
    summary: {},
    jobs: [],
    alerts: [],
    statusConfig: [],
    calendar: null,
    calendarEvents: [],
    selectedJobId: '',
    selectedJob: null,
    selectedPhotos: [],
    technicians: [],
    customerSuggestions: [],
    filters: {
      query: '',
      status: 'ALL',
      mode: 'ALL'
    },
    ui: {}
  };

  function el(id) {
    return document.getElementById(id);
  }

  function ensureUiRefs() {
    APP.ui = {
      apiMode: el('apiMode'),
      lastSync: el('lastSync'),
      topTech: el('topTech'),
      pendingPhotos: el('pendingPhotos'),
      openAlerts: el('openAlerts'),
      totalJobs: el('totalJobs'),
      lowStock: el('lowStock'),
      overdueJobs: el('overdueJobs'),
      pmCustomers: el('pmCustomers'),
      revToday: el('revToday'),
      revWeek: el('revWeek'),
      revMonth: el('revMonth'),
      statusGrid: el('statusGrid'),
      alertsList: el('alertsList'),
      recentJobs: el('recentJobs'),
      searchInput: el('searchInput'),
      statusFilter: el('statusFilter'),
      jobResultMeta: el('jobResultMeta'),
      refreshAllBtn: el('refreshAllBtn'),
      refreshJobsBtn: el('refreshJobsBtn'),
      clearFiltersBtn: el('clearFiltersBtn'),
      goJobsFromOverview: el('goJobsFromOverview'),
      calendarView: el('calendarView'),
      calendarJobsPool: el('calendarJobsPool'),
      calendarTodayBtn: el('calendarTodayBtn'),
      refreshCalendarBtn: el('refreshCalendarBtn'),
      newJobForm: el('newJobForm'),
      newJobCustomer: el('newJobCustomer'),
      newJobCustomerId: el('newJobCustomerId'),
      newJobTech: el('newJobTech'),
      newJobAppointment: el('newJobAppointment'),
      newJobSymptom: el('newJobSymptom'),
      newJobNote: el('newJobNote'),
      newJobFormMeta: el('newJobFormMeta'),
      resetNewJobBtn: el('resetNewJobBtn'),
      customerSuggestions: el('customerSuggestions'),
      jobDrawerBackdrop: el('jobDrawerBackdrop'),
      closeJobDrawerBtn: el('closeJobDrawerBtn'),
      jobDrawerTitle: el('jobDrawerTitle'),
      jobDrawerStatus: el('jobDrawerStatus'),
      jobDetailTableBody: el('jobDetailTableBody'),
      jobFolderLinkWrap: el('jobFolderLinkWrap'),
      jobActionButtons: el('jobActionButtons'),
      jobQuickNoteInput: el('jobQuickNoteInput'),
      saveQuickNoteBtn: el('saveQuickNoteBtn'),
      shareJobPhotosBtn: el('shareJobPhotosBtn'),
      refreshJobDetailBtn: el('refreshJobDetailBtn'),
      jobThumbGrid: el('jobThumbGrid'),
      jobTimelineWrap: el('jobTimelineWrap'),
      imageLightbox: el('imageLightbox'),
      lightboxImage: el('lightboxImage'),
      lightboxTitle: el('lightboxTitle'),
      closeLightboxBtn: el('closeLightboxBtn')
    };
  }

  function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function show(node) {
    if (node) node.classList.remove('hidden');
  }

  function hide(node) {
    if (node) node.classList.add('hidden');
  }

  function setText(nodeOrId, value) {
    var node = typeof nodeOrId === 'string' ? el(nodeOrId) : nodeOrId;
    if (node) node.textContent = value;
  }

  function setHtml(nodeOrId, html) {
    var node = typeof nodeOrId === 'string' ? el(nodeOrId) : nodeOrId;
    if (node) node.innerHTML = html;
  }

  function formatNumber(value) {
    var number = Number(value || 0);
    if (!isFinite(number)) number = 0;
    return number.toLocaleString('th-TH');
  }

  function formatCurrency(value) {
    var number = Number(value || 0);
    if (!isFinite(number)) number = 0;
    return '฿' + number.toLocaleString('th-TH', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });
  }

  function toDate(value) {
    if (!value) return null;
    if (value instanceof Date) return isNaN(value.getTime()) ? null : value;
    if (typeof value === 'number') {
      var direct = new Date(value);
      return isNaN(direct.getTime()) ? null : direct;
    }
    var text = String(value).trim();
    if (!text) return null;

    var normalized = text.replace(/\./g, '/').replace(/-/g, '/');
    var match = normalized.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:\s+(\d{1,2}):(\d{2}))?$/);
    if (match) {
      var dd = Number(match[1]);
      var mm = Number(match[2]) - 1;
      var yy = Number(match[3]);
      if (yy < 100) yy += 2000;
      var hh = Number(match[4] || 0);
      var mi = Number(match[5] || 0);
      var parsed = new Date(yy, mm, dd, hh, mi, 0, 0);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    var iso = new Date(text);
    return isNaN(iso.getTime()) ? null : iso;
  }

  function formatDateTime(value) {
    var date = toDate(value);
    if (!date) return value ? String(value) : '-';
    return date.toLocaleString('th-TH', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function formatDate(value) {
    var date = toDate(value);
    if (!date) return value ? String(value) : '-';
    return date.toLocaleDateString('th-TH', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    });
  }

  function toInputDateTimeLocal(value) {
    var date = toDate(value);
    if (!date) return '';
    var local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
    return local.toISOString().slice(0, 16);
  }

  function debounce(fn, delay) {
    var timer = null;
    return function () {
      var context = this;
      var args = arguments;
      window.clearTimeout(timer);
      timer = window.setTimeout(function () {
        fn.apply(context, args);
      }, delay || 250);
    };
  }

  function normalizeServerResponse(functionName, response) {
    if (!response) return response;
    if (response && typeof response === 'object' && Object.prototype.hasOwnProperty.call(response, 'data')) return response.data;
    return response;
  }

  function callServer(functionName, args) {
    args = Array.isArray(args) ? args : [];
    return new Promise(function (resolve, reject) {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        reject(new Error('Google Apps Script runtime is not available'));
        return;
      }

      var runner = google.script.run
        .withSuccessHandler(function (result) {
          resolve(normalizeServerResponse(functionName, result));
        })
        .withFailureHandler(function (error) {
          reject(error instanceof Error ? error : new Error(error && error.message ? error.message : String(error)));
        });

      try {
        if (typeof runner[functionName] === 'function') {
          runner[functionName].apply(runner, args);
          return;
        }
      } catch (directError) {}

      try {
        if (typeof runner.routeActionV55 === 'function') {
          runner.routeActionV55(functionName, args[0] || {});
          return;
        }
      } catch (routeError) {}

      reject(new Error('Server function not found: ' + functionName));
    });
  }

  function buildToastRoot() {
    var root = el('comphoneToastRoot');
    if (root) return root;
    root = document.createElement('div');
    root.id = 'comphoneToastRoot';
    root.style.position = 'fixed';
    root.style.left = '12px';
    root.style.right = '12px';
    root.style.bottom = '14px';
    root.style.zIndex = '200';
    root.style.display = 'grid';
    root.style.gap = '8px';
    root.style.maxWidth = '440px';
    root.style.margin = '0 auto';
    document.body.appendChild(root);
    return root;
  }

  function toast(message, type) {
    var root = buildToastRoot();
    var tone = type || 'info';
    var card = document.createElement('div');
    var gradients = {
      success: 'linear-gradient(180deg, rgba(82,213,155,0.24), rgba(9,24,18,0.96))',
      error: 'linear-gradient(180deg, rgba(251,122,128,0.24), rgba(31,10,13,0.96))',
      warning: 'linear-gradient(180deg, rgba(248,197,109,0.24), rgba(39,23,7,0.96))',
      info: 'linear-gradient(180deg, rgba(88,208,255,0.24), rgba(9,18,35,0.96))'
    };
    var borders = {
      success: '#52d59b',
      error: '#fb7a80',
      warning: '#f8c56d',
      info: '#58d0ff'
    };
    card.style.padding = '12px 14px';
    card.style.borderRadius = '16px';
    card.style.background = gradients[tone] || gradients.info;
    card.style.border = '1px solid ' + (borders[tone] || borders.info);
    card.style.boxShadow = '0 16px 40px rgba(0,0,0,.28)';
    card.style.fontSize = '13px';
    card.style.lineHeight = '1.5';
    card.textContent = message;
    root.appendChild(card);
    window.setTimeout(function () {
      if (card && card.parentNode) card.parentNode.removeChild(card);
    }, 3200);
  }

  function getStatusLabel(statusValue) {
    if (statusValue === null || statusValue === undefined || statusValue === '') return '-';
    var raw = String(statusValue);
    if (/^\d+$/.test(raw)) {
      for (var i = 0; i < APP.statusConfig.length; i++) {
        if (String(APP.statusConfig[i].code) === raw) return APP.statusConfig[i].label;
      }
    }
    return raw;
  }

  function getStatusAppearance(statusValue) {
    var label = getStatusLabel(statusValue);
    var lookup = {
      'รอมอบหมาย': 'priority-medium',
      'มอบหมายแล้ว': 'priority-info',
      'รับงานแล้ว': 'priority-info',
      'เดินทาง': 'priority-info',
      'ถึงหน้างาน': 'priority-info',
      'เริ่มงาน': 'priority-good',
      'กำลังซ่อม': 'priority-good',
      'รอชิ้นส่วน': 'priority-medium',
      'รอชิ้นส่วนเพิ่ม': 'priority-medium',
      'ซ่อมเสร็จ': 'priority-good',
      'QC ผ่าน': 'priority-good',
      'ลูกค้าตรวจรับ': 'priority-info',
      'รอเก็บเงิน': 'priority-medium',
      'เก็บเงินแล้ว': 'priority-good',
      'ปิดงาน': 'priority-good',
      'ยกเลิก': 'priority-danger'
    };
    return lookup[label] || 'priority-muted';
  }

  function normalizePhotoList(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.filter(Boolean);
    return String(value)
      .split(/[,\n|]/)
      .map(function (item) { return String(item || '').trim(); })
      .filter(function (item) { return /^https?:\/\//i.test(item); });
  }

  function switchTab(name) {
    var tabs = document.querySelectorAll('[data-tab-target]');
    var panels = document.querySelectorAll('[data-tab-panel]');
    tabs.forEach(function (button) {
      button.classList.toggle('is-active', button.getAttribute('data-tab-target') === name);
    });
    panels.forEach(function (panel) {
      panel.classList.toggle('is-active', panel.getAttribute('data-tab-panel') === name);
    });
  }

  function openJobDrawer() {
    if (!APP.ui.jobDrawerBackdrop) return;
    APP.ui.jobDrawerBackdrop.classList.add('is-open');
    APP.ui.jobDrawerBackdrop.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeJobDrawer() {
    if (!APP.ui.jobDrawerBackdrop) return;
    APP.ui.jobDrawerBackdrop.classList.remove('is-open');
    APP.ui.jobDrawerBackdrop.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  function openLightbox(src, title) {
    if (!APP.ui.imageLightbox || !APP.ui.lightboxImage) return;
    APP.ui.lightboxImage.src = src || '';
    APP.ui.lightboxImage.alt = title || 'Job photo';
    setText(APP.ui.lightboxTitle, title || 'รูปงาน');
    APP.ui.imageLightbox.classList.add('is-open');
    APP.ui.imageLightbox.setAttribute('aria-hidden', 'false');
  }

  function closeLightbox() {
    if (!APP.ui.imageLightbox) return;
    APP.ui.imageLightbox.classList.remove('is-open');
    APP.ui.imageLightbox.setAttribute('aria-hidden', 'true');
    if (APP.ui.lightboxImage) APP.ui.lightboxImage.src = '';
  }

  function canWebShareFiles() {
    return !!(navigator.share && navigator.canShare);
  }

  window.comphoneV55 = {
    APP: APP,
    el: el,
    ensureUiRefs: ensureUiRefs,
    escapeHtml: escapeHtml,
    show: show,
    hide: hide,
    setText: setText,
    setHtml: setHtml,
    formatNumber: formatNumber,
    formatCurrency: formatCurrency,
    toDate: toDate,
    formatDateTime: formatDateTime,
    formatDate: formatDate,
    toInputDateTimeLocal: toInputDateTimeLocal,
    debounce: debounce,
    callServer: callServer,
    toast: toast,
    getStatusLabel: getStatusLabel,
    getStatusAppearance: getStatusAppearance,
    normalizePhotoList: normalizePhotoList,
    switchTab: switchTab,
    openJobDrawer: openJobDrawer,
    closeJobDrawer: closeJobDrawer,
    openLightbox: openLightbox,
    closeLightbox: closeLightbox,
    canWebShareFiles: canWebShareFiles
  };
})(window, document);
</script>
