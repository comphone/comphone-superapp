<script>
(function (window, document, api, dashboardApi) {
  'use strict';

  if (!api || !dashboardApi) return;

  var APP = api.APP;
  var currentSection = 'dashboard';
  var inventoryData = [];
  var inventoryFilter = 'ALL';

  // ===== SECTION SWITCHING =====
  window.showSection = function(section) {
    var sections = ['dashboard', 'inventory', 'jobs'];
    sections.forEach(function(s) {
      var el = document.getElementById('section-' + s);
      if (el) el.classList.toggle('hidden', s !== section);
    });
    currentSection = section;

    // Update bottom nav
    sections.forEach(function(s) {
      var nav = document.getElementById('bnav-' + s);
      if (nav) nav.classList.toggle('active', s === section);
    });

    // Update desktop nav
    var navLinks = document.querySelectorAll('.navbar-nav .nav-link');
    navLinks.forEach(function(link) {
      link.classList.remove('active');
    });

    if (section === 'inventory') {
      loadInventoryData();
    }
  };

  // ===== STATUS FILTER =====
  window.filterByStatus = function(status) {
    if (APP.ui.statusFilterSelect) {
      APP.ui.statusFilterSelect.value = status;
    }
    APP.filters.status = status;
    dashboardApi.renderRecentJobs();
    // Scroll to jobs section on mobile
    var jobsSection = document.getElementById('recentJobsTableWrap') || document.getElementById('recentJobsLoading');
    if (jobsSection) jobsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // ===== INVENTORY FUNCTIONS =====
  window.filterInventory = function(locationType) {
    inventoryFilter = locationType;
    
    // Update tabs
    var tabs = document.querySelectorAll('#invTabs .nav-link');
    tabs.forEach(function(tab) {
      tab.classList.remove('active');
      if (tab.getAttribute('onclick') && tab.getAttribute('onclick').indexOf("'" + locationType + "'") > -1) {
        tab.classList.add('active');
      }
    });
    
    renderInventoryTable();
  };

  function loadInventoryData() {
    var loading = document.getElementById('invLoading');
    var empty = document.getElementById('invEmpty');
    var tableWrap = document.getElementById('invTableWrap');
    
    if (loading) loading.classList.remove('hidden');
    if (empty) empty.classList.add('hidden');
    if (tableWrap) tableWrap.classList.add('hidden');

    api.callServer('inventoryOverview', [{}])
      .then(function(result) {
        if (loading) loading.classList.add('hidden');
        if (result && result.success && result.items && result.items.length > 0) {
          inventoryData = result.items;
          updateInventorySummaryCards(result.items);
          renderInventoryTable();
        } else {
          if (empty) empty.classList.remove('hidden');
          inventoryData = [];
        }
      })
      .catch(function(err) {
        if (loading) loading.classList.add('hidden');
        if (empty) empty.classList.remove('hidden');
        api.toast('โหลดข้อมูลสต็อกไม่สำเร็จ: ' + (err.message || err), 'error');
      });
  }

  function updateInventorySummaryCards(items) {
    var mainCount = 0, storeCount = 0, vanCount = 0, lowCount = 0;
    items.forEach(function(item) {
      if (item.main_qty > 0) mainCount++;
      if (item.site_qty > 0) storeCount++;
      if (item.van_qty > 0) vanCount++;
      if (item.total_qty <= 5) lowCount++;
    });
    var invMainTotal = document.getElementById('invMainTotal');
    var invStoreTotal = document.getElementById('invStoreTotal');
    var invVanTotal = document.getElementById('invVanTotal');
    var invLowStockTotal = document.getElementById('invLowStockTotal');
    if (invMainTotal) invMainTotal.textContent = mainCount;
    if (invStoreTotal) invStoreTotal.textContent = storeCount;
    if (invVanTotal) invVanTotal.textContent = vanCount;
    if (invLowStockTotal) invLowStockTotal.textContent = lowCount;
  }

  function renderInventoryTable() {
    var tableWrap = document.getElementById('invTableWrap');
    var tbody = document.getElementById('invTableBody');
    var empty = document.getElementById('invEmpty');
    
    if (!tbody) return;

    var searchQuery = '';
    var searchInput = document.getElementById('invSearchInput');
    if (searchInput) searchQuery = searchInput.value.toLowerCase();

    var filtered = inventoryData.filter(function(item) {
      if (inventoryFilter !== 'ALL') {
        if (inventoryFilter === 'MAIN' && item.main_qty <= 0) return false;
        if (inventoryFilter === 'SITE' && item.site_qty <= 0) return false;
        if (inventoryFilter === 'VAN' && item.van_qty <= 0) return false;
      }
      if (searchQuery) {
        var haystack = (item.item_code + ' ' + item.item_name).toLowerCase();
        if (haystack.indexOf(searchQuery) === -1) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      if (tableWrap) tableWrap.classList.add('hidden');
      if (empty) empty.classList.remove('hidden');
      return;
    }

    if (empty) empty.classList.add('hidden');
    if (tableWrap) tableWrap.classList.remove('hidden');

    var html = '';
    filtered.forEach(function(item) {
      var reorderPt = item.records && item.records[0] ? (Number(item.records[0].reorder_point) || 5) : 5;
      var isLow = item.total_qty <= reorderPt;
      var statusBadge = isLow
        ? '<span class="badge bg-danger">สต็อกต่ำ</span>'
        : '<span class="badge bg-success">ปกติ</span>';
      var cost = item.records && item.records[0] ? Number(item.records[0].cost || 0) : 0;
      var price = item.records && item.records[0] ? Number(item.records[0].price || 0) : 0;

      html += '<tr>';
      html += '<td><code class="text-primary" style="cursor:pointer" onclick="openBarcodeWithCode(\'' + api.escapeHtml(item.item_code || '') + '\')">' + api.escapeHtml(item.item_code || '-') + '</code></td>';
      html += '<td><strong>' + api.escapeHtml(item.item_name || '-') + '</strong></td>';
      html += '<td class="text-center text-muted small">' + (cost > 0 ? '฿' + cost.toLocaleString() : '-') + '</td>';
      html += '<td class="text-center small">' + (price > 0 ? '<span class="text-primary fw-bold">฿' + price.toLocaleString() + '</span>' : '-') + '</td>';
      html += '<td class="text-center">' + (item.main_qty || 0) + '</td>';
      html += '<td class="text-center">' + (item.site_qty || 0) + '</td>';
      html += '<td class="text-center">' + (item.van_qty || 0) + '</td>';
      html += '<td class="text-center fw-bold ' + (isLow ? 'text-danger' : '') + '">' + (item.total_qty || 0) + '</td>';
      html += '<td class="text-center">' + statusBadge + '</td>';
      html += '<td class="text-center">';
      html += '<div class="btn-group btn-group-sm">';
      html += '<button class="btn btn-outline-primary" title="แก้ไข" onclick="openEditItemModal(\'' + api.escapeHtml(item.item_code || '') + '\')">';
      html += '<i class="fas fa-edit"></i></button>';
      html += '<button class="btn btn-outline-secondary" title="ประวัติ" onclick="openStockMovement(\'' + api.escapeHtml(item.item_code || '') + '\', \'' + api.escapeHtml(item.item_name || '') + '\')">';
      html += '<i class="fas fa-history"></i></button>';
      html += '<button class="btn btn-outline-danger" title="ลบ" onclick="confirmDeleteItem(\'' + api.escapeHtml(item.item_code || '') + '\', \'' + api.escapeHtml(item.item_name || '') + '\')">';
      html += '<i class="fas fa-trash"></i></button>';
      html += '</div>';
      html += '</td>';
      html += '</tr>';
    });
    tbody.innerHTML = html;
  }

  // ===== TRANSFER MODAL =====
  window.openTransferModal = function() {
    // Populate item select
    var select = document.getElementById('transferItemSelect');
    if (select && inventoryData.length > 0) {
      var opts = '<option value="">-- เลือกสินค้า --</option>';
      inventoryData.forEach(function(item) {
        opts += '<option value="' + api.escapeHtml(item.item_code) + '">' + api.escapeHtml(item.item_name) + ' (รวม: ' + item.total_qty + ')</option>';
      });
      select.innerHTML = opts;
    }
    var modal = new bootstrap.Modal(document.getElementById('transferModal'));
    modal.show();
  };

  window.openReceiveModal = function() {
    api.toast('ฟีเจอร์รับของเข้า — กำลังพัฒนา', 'info');
  };

  // ===== JOB DETAIL (Bootstrap Modal version) =====
  function getJobById(jobId) {
    var jobs = APP.jobs || [];
    for (var i = 0; i < jobs.length; i++) {
      var candidate = jobs[i] || {};
      var id = String(candidate.id || candidate.job_id || '');
      if (id === String(jobId || '')) return candidate;
    }
    return null;
  }

  function collectNextStates(currentJob) {
    var currentStatus = api.getStatusLabel(
      currentJob && (currentJob.status || currentJob.status_label || currentJob.current_status || currentJob.current_status_code)
    );
    for (var i = 0; i < APP.statusConfig.length; i++) {
      var state = APP.statusConfig[i];
      if (String(state.label || '') === currentStatus) {
        return state.allowed_next || [];
      }
    }
    return [];
  }

  async function loadTimeline(jobId) {
    var target = document.getElementById('jobTimelineBody');
    if (!target) return;
    target.innerHTML = '<div class="text-muted py-2">กำลังโหลด timeline...</div>';
    try {
      var response = await api.callServer('getJobTimeline', [jobId]);
      var items = response && response.timeline ? response.timeline : [];
      if (!items.length) {
        target.innerHTML = '<div class="text-muted py-2">ยังไม่มีประวัติของงานนี้</div>';
        return;
      }
      var html = '';
      items.slice(0, 20).forEach(function(item) {
        html += '<div class="timeline-item">';
        html += '<div class="timeline-dot"></div>';
        html += '<div>';
        html += '<div class="text-muted" style="font-size:0.75rem;">' + api.escapeHtml(String(item.ts || '-')) + '</div>';
        html += '<div class="fw-semibold">' + api.escapeHtml(String(item.action || '-')) + '</div>';
        if (item.detail) html += '<div class="text-muted small">' + api.escapeHtml(String(item.detail)) + '</div>';
        html += '</div>';
        html += '</div>';
      });
      target.innerHTML = html;
    } catch (error) {
      target.innerHTML = '<div class="text-danger small">โหลด timeline ไม่สำเร็จ</div>';
    }
  }

  async function applyStatusTransition(nextStatusCode) {
    var jobId = APP.selectedJobId;
    if (!jobId) return;
    try {
      var result = await api.callServer('transitionJob', [jobId, Number(nextStatusCode), { changed_by: 'V5.5 Dashboard', note: 'เปลี่ยนสถานะผ่าน Dashboard V5.5' }]);
      if (result && result.success === false) {
        throw new Error(result.error || 'เปลี่ยนสถานะไม่สำเร็จ');
      }
      api.toast('อัปเดตสถานะงานสำเร็จ', 'success');
      var modal = bootstrap.Modal.getInstance(document.getElementById('jobDetailModal'));
      if (modal) modal.hide();
      await dashboardApi.fetchDashboardData();
    } catch (error) {
      api.toast('เปลี่ยนสถานะไม่สำเร็จ: ' + (error.message || error), 'error');
    }
  }

  async function saveQuickNote() {
    var jobId = APP.selectedJobId;
    var textarea = document.getElementById('jobQuickNoteInput');
    var note = textarea ? String(textarea.value || '').trim() : '';
    if (!jobId || !note) {
      api.toast('กรอกหมายเหตุก่อนบันทึก', 'warning');
      return;
    }
    try {
      var result = await api.callServer('addQuickNote', [jobId, note, 'V5.5 Dashboard']);
      if (result && result.success === false) throw new Error(result.error || 'บันทึกหมายเหตุไม่สำเร็จ');
      api.toast('บันทึกหมายเหตุแล้ว', 'success');
      await loadTimeline(jobId);
      if (textarea) textarea.value = '';
    } catch (error) {
      api.toast('บันทึกหมายเหตุไม่สำเร็จ: ' + (error.message || error), 'error');
    }
  }

  function openJobDetail(jobId) {
    var job = getJobById(jobId);
    if (!job) {
      api.toast('ไม่พบข้อมูลงาน ' + jobId, 'error');
      return;
    }

    APP.selectedJobId = String(jobId);
    var nextStates = collectNextStates(job);
    var statusLabel = api.getStatusLabel(job.status || job.status_label || job.current_status || job.current_status_code || '-');
    var folderUrl = String(job.folder || job.folder_url || '');

    // Build modal body
    var actionsHtml = '';
    if (nextStates.length) {
      nextStates.forEach(function(state) {
        actionsHtml += '<button type="button" class="btn btn-outline-primary btn-sm" data-next-status="' + api.escapeHtml(String(state.code)) + '">→ ' + api.escapeHtml(String(state.label || state.code)) + '</button>';
      });
    } else {
      actionsHtml = '<span class="text-muted small">ไม่มีขั้นตอนถัดไป</span>';
    }

    var bodyHtml = '';
    bodyHtml += '<div class="row g-3 mb-3">';
    bodyHtml += '<div class="col-6"><div class="bg-light rounded p-2"><div class="text-muted small">Job ID</div><div class="fw-bold">' + api.escapeHtml(String(job.id || job.job_id || '-')) + '</div></div></div>';
    bodyHtml += '<div class="col-6"><div class="bg-light rounded p-2"><div class="text-muted small">สถานะ</div><div class="fw-bold">' + api.escapeHtml(statusLabel) + '</div></div></div>';
    bodyHtml += '<div class="col-6"><div class="bg-light rounded p-2"><div class="text-muted small">ลูกค้า</div><div class="fw-bold">' + api.escapeHtml(String(job.customer || job.customer_name || '-')) + '</div></div></div>';
    bodyHtml += '<div class="col-6"><div class="bg-light rounded p-2"><div class="text-muted small">ช่าง</div><div class="fw-bold">' + api.escapeHtml(String(job.tech || job.technician || '-')) + '</div></div></div>';
    bodyHtml += '<div class="col-12"><div class="bg-light rounded p-2"><div class="text-muted small">อาการ / รายละเอียด</div><div>' + api.escapeHtml(String(job.symptom || job.issue || job.description || '-')) + '</div></div></div>';
    bodyHtml += '</div>';
    
    if (folderUrl && folderUrl !== '-') {
      bodyHtml += '<a href="' + api.escapeHtml(folderUrl) + '" target="_blank" class="btn btn-outline-secondary btn-sm mb-3"><i class="fas fa-folder-open me-1"></i>เปิดโฟลเดอร์งาน</a>';
    }

    bodyHtml += '<div class="mb-3">';
    bodyHtml += '<h6 class="fw-bold mb-2">เปลี่ยนสถานะงาน</h6>';
    bodyHtml += '<div id="jobTransitionActions" class="d-flex flex-wrap gap-2">' + actionsHtml + '</div>';
    bodyHtml += '</div>';

    bodyHtml += '<div class="mb-3">';
    bodyHtml += '<h6 class="fw-bold mb-2">บันทึกหมายเหตุด่วน</h6>';
    bodyHtml += '<textarea id="jobQuickNoteInput" class="form-control mb-2" rows="2" placeholder="พิมพ์หมายเหตุหรือผลการติดตาม"></textarea>';
    bodyHtml += '<button type="button" id="saveQuickNoteBtn" class="btn btn-success btn-sm"><i class="fas fa-save me-1"></i>บันทึก</button>';
    bodyHtml += '</div>';

    bodyHtml += '<div>';
    bodyHtml += '<h6 class="fw-bold mb-2">Timeline</h6>';
    bodyHtml += '<div id="jobTimelineBody"></div>';
    bodyHtml += '</div>';

    // Set modal title and body
    var titleEl = document.getElementById('jobDetailTitle');
    var bodyEl = document.getElementById('jobDetailBody');
    if (titleEl) titleEl.textContent = 'งาน ' + String(job.id || job.job_id || '-') + ' — ' + statusLabel;
    if (bodyEl) bodyEl.innerHTML = bodyHtml;

    // Show modal
    var modal = new bootstrap.Modal(document.getElementById('jobDetailModal'));
    modal.show();

    // Bind events
    var transitionWrap = document.getElementById('jobTransitionActions');
    if (transitionWrap) {
      transitionWrap.addEventListener('click', function(event) {
        var target = event.target;
        if (!target || !target.getAttribute) return;
        var nextStatus = target.getAttribute('data-next-status');
        if (nextStatus) applyStatusTransition(nextStatus);
      });
    }

    var noteBtn = document.getElementById('saveQuickNoteBtn');
    if (noteBtn) noteBtn.addEventListener('click', saveQuickNote);

    // Load timeline
    loadTimeline(jobId);
  }

  // ===== FILTER SYNC =====
  function syncFiltersFromUi() {
    APP.filters.query = APP.ui.jobSearchInput ? String(APP.ui.jobSearchInput.value || '') : '';
    APP.filters.status = APP.ui.statusFilterSelect ? String(APP.ui.statusFilterSelect.value || 'ALL') : 'ALL';
    APP.filters.limit = APP.ui.recentJobsLimitSelect ? Number(APP.ui.recentJobsLimitSelect.value || 20) : 20;
  }

  function clearFilters() {
    if (APP.ui.jobSearchInput) APP.ui.jobSearchInput.value = '';
    if (APP.ui.statusFilterSelect) APP.ui.statusFilterSelect.value = 'ALL';
    if (APP.ui.recentJobsLimitSelect) APP.ui.recentJobsLimitSelect.value = String((APP.config && APP.config.defaultLimit) || 20);
    syncFiltersFromUi();
    dashboardApi.renderRecentJobs();
  }

  async function handleRefresh() {
    syncFiltersFromUi();
    await dashboardApi.fetchDashboardData();
    api.toast('รีเฟรชข้อมูลสำเร็จ', 'success');
  }

  // ===== TRANSFER CONFIRM =====
  async function handleTransferConfirm() {
    var itemCode = document.getElementById('transferItemSelect') ? document.getElementById('transferItemSelect').value : '';
    var fromLoc = document.getElementById('transferFromSelect') ? document.getElementById('transferFromSelect').value : '';
    var toLoc = document.getElementById('transferToSelect') ? document.getElementById('transferToSelect').value : '';
    var qty = document.getElementById('transferQtyInput') ? Number(document.getElementById('transferQtyInput').value) : 0;

    if (!itemCode || !fromLoc || !toLoc || !qty) {
      api.toast('กรุณากรอกข้อมูลให้ครบ', 'warning');
      return;
    }
    if (fromLoc === toLoc) {
      api.toast('ต้นทางและปลายทางต้องไม่เหมือนกัน', 'warning');
      return;
    }

    try {
      var result = await api.callServer('transferStock', [fromLoc, toLoc, itemCode, qty, {}]);
      if (result && result.success) {
        api.toast('โอนย้ายสำเร็จ: ' + (result.item_name || itemCode) + ' จำนวน ' + qty, 'success');
        var modal = bootstrap.Modal.getInstance(document.getElementById('transferModal'));
        if (modal) modal.hide();
        loadInventoryData();
      } else {
        api.toast('โอนย้ายไม่สำเร็จ: ' + (result && result.error ? result.error : 'ไม่ทราบสาเหตุ'), 'error');
      }
    } catch (err) {
      api.toast('เกิดข้อผิดพลาด: ' + (err.message || err), 'error');
    }
  }

  // ===== EVENT BINDING =====
  function bindEvents() {
    api.ensureUiRefs();

    // Search input
    if (APP.ui.jobSearchInput) {
      APP.ui.jobSearchInput.addEventListener('input', function() {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }

    // Status filter
    if (APP.ui.statusFilterSelect) {
      APP.ui.statusFilterSelect.addEventListener('change', function() {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }

    // Limit select
    if (APP.ui.recentJobsLimitSelect) {
      APP.ui.recentJobsLimitSelect.addEventListener('change', function() {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }

    // Refresh button
    if (APP.ui.refreshDashboardBtn) {
      APP.ui.refreshDashboardBtn.addEventListener('click', function() { handleRefresh(); });
    }
    var refreshBtnMobile = document.getElementById('refreshBtnMobile');
    if (refreshBtnMobile) {
      refreshBtnMobile.addEventListener('click', function() { handleRefresh(); });
    }

    // Job table click
    if (APP.ui.recentJobsTableBody) {
      APP.ui.recentJobsTableBody.addEventListener('click', function(event) {
        var row = event.target;
        while (row && row.tagName !== 'TR') row = row.parentNode;
        if (!row) return;
        var jobId = row.getAttribute('data-job-id');
        if (jobId) openJobDetail(jobId);
      });
    }

    // Status board click
    if (APP.ui.statusBoard) {
      APP.ui.statusBoard.addEventListener('click', function(event) {
        var card = event.target;
        while (card && !card.getAttribute('data-status-label')) card = card.parentNode;
        if (!card) return;
        var statusLabel = card.getAttribute('data-status-label') || 'ALL';
        if (APP.ui.statusFilterSelect) APP.ui.statusFilterSelect.value = statusLabel;
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
        // Scroll to recent jobs
        var tableSection = document.getElementById('recentJobsLoading') || document.getElementById('recentJobsTableWrap');
        if (tableSection) tableSection.scrollIntoView({ behavior: 'smooth' });
      });
    }

    // Inventory search
    var invSearch = document.getElementById('invSearchInput');
    if (invSearch) {
      invSearch.addEventListener('input', function() { renderInventoryTable(); });
    }

    // Transfer confirm
    var confirmTransferBtn = document.getElementById('confirmTransferBtn');
    if (confirmTransferBtn) {
      confirmTransferBtn.addEventListener('click', handleTransferConfirm);
    }

    // New job buttons
    var newJobBtn = document.getElementById('newJobBtn');
    var newJobBtnDesktop = document.getElementById('newJobBtnDesktop');
    var bnavNewjob = document.getElementById('bnav-newjob');
    var handleNewJob = function(e) {
      e.preventDefault();
      api.toast('ฟีเจอร์สร้างงานใหม่ — กำลังพัฒนา', 'info');
    };
    if (newJobBtn) newJobBtn.addEventListener('click', handleNewJob);
    if (newJobBtnDesktop) newJobBtnDesktop.addEventListener('click', handleNewJob);
    if (bnavNewjob) bnavNewjob.addEventListener('click', handleNewJob);
  }

  // ===== INVENTORY CRUD =====
  var _poItems = [];

  window.openAddItemModal = function() {
    document.getElementById('itemModalTitle').innerHTML = '<i class="fas fa-plus me-2"></i>เพิ่มสินค้าใหม่';
    document.getElementById('itemModalMode').value = 'add';
    document.getElementById('itemCode').value = '';
    document.getElementById('itemCode').removeAttribute('readonly');
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = '0';
    document.getElementById('itemCost').value = '0';
    document.getElementById('itemPrice').value = '0';
    document.getElementById('itemLocType').value = 'MAIN';
    document.getElementById('itemLocCode').value = '';
    document.getElementById('itemReorderPoint').value = '5';
    document.getElementById('itemNotes').value = '';
    document.getElementById('itemModalAlert').innerHTML = '';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  };

  window.openEditItemModal = function(itemCode) {
    var item = inventoryData.find(function(i) { return i.item_code === itemCode; });
    if (!item) { api.toast('ไม่พบข้อมูลสินค้า', 'warning'); return; }
    var rec = (item.records && item.records[0]) || {};
    document.getElementById('itemModalTitle').innerHTML = '<i class="fas fa-edit me-2"></i>แก้ไขสินค้า';
    document.getElementById('itemModalMode').value = 'edit';
    document.getElementById('itemCode').value = itemCode;
    document.getElementById('itemCode').setAttribute('readonly', true);
    document.getElementById('itemName').value = item.item_name || '';
    document.getElementById('itemQty').value = item.total_qty || 0;
    document.getElementById('itemCost').value = rec.cost || 0;
    document.getElementById('itemPrice').value = rec.price || 0;
    document.getElementById('itemLocType').value = rec.location_type || 'MAIN';
    document.getElementById('itemLocCode').value = rec.location_code || '';
    document.getElementById('itemReorderPoint').value = rec.reorder_point || 5;
    document.getElementById('itemNotes').value = rec.notes || '';
    document.getElementById('itemModalAlert').innerHTML = '';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  };

  window.saveInventoryItem = function() {
    var mode = document.getElementById('itemModalMode').value;
    var code = document.getElementById('itemCode').value.trim();
    var name = document.getElementById('itemName').value.trim();
    if (!code || !name) {
      document.getElementById('itemModalAlert').innerHTML = '<div class="alert alert-danger">กรุณากรอกรหัสและชื่อสินค้า</div>';
      return;
    }
    var payload = {
      item_code: code, item_name: name,
      qty: Number(document.getElementById('itemQty').value) || 0,
      cost: Number(document.getElementById('itemCost').value) || 0,
      price: Number(document.getElementById('itemPrice').value) || 0,
      location_type: document.getElementById('itemLocType').value,
      location_code: document.getElementById('itemLocCode').value.trim(),
      reorder_point: Number(document.getElementById('itemReorderPoint').value) || 5,
      notes: document.getElementById('itemNotes').value.trim()
    };
    var action = mode === 'add' ? 'addInventoryItem' : 'updateInventoryItem';
    var btn = document.getElementById('saveItemBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>กำลังบันทึก...';
    api.call(action, payload, function(res) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save me-1"></i>บันทึก';
      if (res && res.success) {
        bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();
        api.toast((mode === 'add' ? 'เพิ่ม' : 'อัปเดต') + 'สินค้าสำเร็จ', 'success');
        api.call('inventoryOverview', {}, function(r) {
          if (r && r.items) { inventoryData = r.items; renderInventoryTable(); }
        });
      } else {
        document.getElementById('itemModalAlert').innerHTML = '<div class="alert alert-danger">' + (res && res.error ? res.error : 'เกิดข้อผิดพลาด') + '</div>';
      }
    });
  };

  window.confirmDeleteItem = function(itemCode, itemName) {
    if (!confirm('ลบสินค้า "' + itemName + '" ?
การดำเนินการนี้ไม่สามารถย้อนกลับได้')) return;
    api.call('deleteInventoryItem', { item_code: itemCode }, function(res) {
      if (res && res.success) {
        api.toast('ลบสินค้าเรียบร้อย', 'success');
        api.call('inventoryOverview', {}, function(r) {
          if (r && r.items) { inventoryData = r.items; renderInventoryTable(); }
        });
      } else {
        api.toast('ลบไม่สำเร็จ: ' + (res && res.error ? res.error : 'เกิดข้อผิดพลาด'), 'danger');
      }
    });
  };

  // ===== BARCODE SCANNER =====
  window.openBarcodeScanner = function() {
    document.getElementById('barcodeInput').value = '';
    document.getElementById('barcodeResult').classList.add('d-none');
    document.getElementById('barcodeNotFound').classList.add('d-none');
    var modal = new bootstrap.Modal(document.getElementById('barcodeModal'));
    modal.show();
    setTimeout(function() { document.getElementById('barcodeInput').focus(); }, 400);
  };

  window.openBarcodeWithCode = function(code) {
    document.getElementById('barcodeInput').value = code;
    var modal = new bootstrap.Modal(document.getElementById('barcodeModal'));
    modal.show();
    setTimeout(function() { lookupBarcode(); }, 300);
  };

  window.lookupBarcode = function() {
    var code = document.getElementById('barcodeInput').value.trim();
    if (!code) return;
    document.getElementById('barcodeResult').classList.add('d-none');
    document.getElementById('barcodeNotFound').classList.add('d-none');
    api.call('barcodeLookup', { item_code: code }, function(res) {
      if (res && res.success && res.item) {
        var item = res.item;
        document.getElementById('bcItemName').textContent = item.item_name || '-';
        document.getElementById('bcItemCode').textContent = item.item_code || '-';
        var avail = (item.total_qty || 0) - (item.reserved_qty || 0);
        document.getElementById('bcQty').textContent = item.total_qty || 0;
        document.getElementById('bcReserved').textContent = item.reserved_qty || 0;
        document.getElementById('bcAvailable').textContent = avail;
        document.getElementById('bcCost').textContent = '฿' + Number(item.cost || 0).toLocaleString();
        document.getElementById('bcPrice').textContent = '฿' + Number(item.price || 0).toLocaleString();
        var isLow = (item.total_qty || 0) <= (item.reorder_point || 5);
        document.getElementById('bcStatusBadge').className = 'badge ' + (isLow ? 'bg-danger' : 'bg-success');
        document.getElementById('bcStatusBadge').textContent = isLow ? 'สต็อกต่ำ' : 'ปกติ';
        document.getElementById('bcWithdrawQty').value = '1';
        document.getElementById('barcodeResult').classList.remove('d-none');
      } else {
        document.getElementById('barcodeNotFound').classList.remove('d-none');
      }
    });
  };

  window.withdrawFromBarcode = function() {
    var code = document.getElementById('barcodeInput').value.trim();
    var qty = Number(document.getElementById('bcWithdrawQty').value) || 1;
    if (!code || qty < 1) return;
    api.call('scanWithdrawStock', { item_code: code, qty: qty }, function(res) {
      if (res && res.success) {
        api.toast('เบิกสินค้า ' + qty + ' ชิ้นเรียบร้อย', 'success');
        lookupBarcode();
        api.call('inventoryOverview', {}, function(r) {
          if (r && r.items) { inventoryData = r.items; renderInventoryTable(); }
        });
      } else {
        api.toast('เบิกไม่สำเร็จ: ' + (res && res.error || 'สต็อกไม่พอ'), 'danger');
      }
    });
  };

  window.editItemFromBarcode = function() {
    var code = document.getElementById('barcodeInput').value.trim();
    bootstrap.Modal.getInstance(document.getElementById('barcodeModal')).hide();
    setTimeout(function() { openEditItemModal(code); }, 400);
  };

  window.openAddFromBarcode = function() {
    var code = document.getElementById('barcodeInput').value.trim();
    bootstrap.Modal.getInstance(document.getElementById('barcodeModal')).hide();
    setTimeout(function() {
      openAddItemModal();
      document.getElementById('itemCode').value = code;
    }, 400);
  };

  // ===== STOCK MOVEMENT =====
  window.openStockMovement = function(itemCode, itemName) {
    document.getElementById('movementItemTitle').textContent = itemName + ' (' + itemCode + ')';
    document.getElementById('movementLoading').classList.remove('d-none');
    document.getElementById('movementEmpty').classList.add('d-none');
    document.getElementById('movementTableBody').innerHTML = '';
    new bootstrap.Modal(document.getElementById('stockMovementModal')).show();
    api.call('getStockMovementHistory', { item_code: itemCode }, function(res) {
      document.getElementById('movementLoading').classList.add('d-none');
      if (!res || !res.movements || res.movements.length === 0) {
        document.getElementById('movementEmpty').classList.remove('d-none');
        return;
      }
      var html = '';
      res.movements.forEach(function(m) {
        var qtyClass = m.qty_change > 0 ? 'text-success' : 'text-danger';
        var qtySign = m.qty_change > 0 ? '+' : '';
        html += '<tr>';
        html += '<td class="small">' + (m.date || '-') + '</td>';
        html += '<td class="small">' + api.escapeHtml(m.action || '-') + '</td>';
        html += '<td class="text-center ' + qtyClass + ' fw-bold">' + qtySign + (m.qty_change || 0) + '</td>';
        html += '<td class="text-center">' + (m.qty_before || 0) + '</td>';
        html += '<td class="text-center">' + (m.qty_after || 0) + '</td>';
        html += '<td class="small">' + api.escapeHtml(m.reference || m.changed_by || '-') + '</td>';
        html += '</tr>';
      });
      document.getElementById('movementTableBody').innerHTML = html;
    });
  };

  // ===== PURCHASE ORDER =====
  window.openPurchaseOrderModal = function() {
    _poItems = [];
    document.getElementById('poSupplier').value = '';
    document.getElementById('poNotes').value = '';
    document.getElementById('poItemsList').innerHTML = '<div class="text-muted small text-center py-2">กด "เพิ่มรายการ" เพื่อเพิ่มสินค้า</div>';
    document.getElementById('poTotalCost').textContent = '฿0';
    document.getElementById('poModalAlert').innerHTML = '';
    new bootstrap.Modal(document.getElementById('purchaseOrderModal')).show();
  };

  window.addPOItem = function() {
    var idx = _poItems.length;
    _poItems.push({ item_code: '', item_name: '', qty: 1, unit_cost: 0 });
    renderPOItems();
  };

  function renderPOItems() {
    if (_poItems.length === 0) {
      document.getElementById('poItemsList').innerHTML = '<div class="text-muted small text-center py-2">กด "เพิ่มรายการ" เพื่อเพิ่มสินค้า</div>';
      document.getElementById('poTotalCost').textContent = '฿0';
      return;
    }
    var html = '';
    var total = 0;
    _poItems.forEach(function(item, i) {
      var subtotal = (Number(item.qty) || 0) * (Number(item.unit_cost) || 0);
      total += subtotal;
      html += '<div class="border rounded p-2 mb-2">';
      html += '<div class="row g-2 align-items-center">';
      html += '<div class="col-5"><input type="text" class="form-control form-control-sm" placeholder="รหัส/ชื่อสินค้า" value="' + api.escapeHtml(item.item_name || item.item_code || '') + '" onchange="updatePOItem(' + i + ', \'name\', this.value)"></div>';
      html += '<div class="col-2"><input type="number" class="form-control form-control-sm" placeholder="จำนวน" min="1" value="' + (item.qty || 1) + '" onchange="updatePOItem(' + i + ', \'qty\', this.value)"></div>';
      html += '<div class="col-3"><input type="number" class="form-control form-control-sm" placeholder="ราคา/ชิ้น" min="0" value="' + (item.unit_cost || 0) + '" onchange="updatePOItem(' + i + ', \'cost\', this.value)"></div>';
      html += '<div class="col-2 text-end"><button class="btn btn-sm btn-outline-danger" onclick="removePOItem(' + i + ')"><i class="fas fa-times"></i></button></div>';
      html += '</div>';
      html += '<div class="text-end text-muted small mt-1">รวม: ฿' + subtotal.toLocaleString() + '</div>';
      html += '</div>';
    });
    document.getElementById('poItemsList').innerHTML = html;
    document.getElementById('poTotalCost').textContent = '฿' + total.toLocaleString();
  }

  window.updatePOItem = function(idx, field, val) {
    if (field === 'name') _poItems[idx].item_name = val;
    else if (field === 'qty') _poItems[idx].qty = Number(val) || 1;
    else if (field === 'cost') _poItems[idx].unit_cost = Number(val) || 0;
    renderPOItems();
  };

  window.removePOItem = function(idx) {
    _poItems.splice(idx, 1);
    renderPOItems();
  };

  window.submitPurchaseOrder = function() {
    if (_poItems.length === 0) {
      document.getElementById('poModalAlert').innerHTML = '<div class="alert alert-warning">กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ</div>';
      return;
    }
    var payload = {
      supplier: document.getElementById('poSupplier').value.trim(),
      notes: document.getElementById('poNotes').value.trim(),
      items: _poItems
    };
    api.call('createPurchaseOrder', payload, function(res) {
      if (res && res.success) {
        bootstrap.Modal.getInstance(document.getElementById('purchaseOrderModal')).hide();
        api.toast('สร้างใบสั่งซื้อเรียบร้อย (เลขที่ ' + (res.po_number || '') + ')', 'success');
      } else {
        document.getElementById('poModalAlert').innerHTML = '<div class="alert alert-danger">' + (res && res.error ? res.error : 'เกิดข้อผิดพลาด') + '</div>';
      }
    });
  };

  // ===== INIT =====
  document.addEventListener('DOMContentLoaded', function() {
    bindEvents();
    syncFiltersFromUi();
    dashboardApi.initializeDashboard();
  });

})(window, document, window.comphoneV55, window.COMPHONE_V55_DASHBOARD);
</script>
