<!-- COMPHONE SUPER APP V5.5 -->
<script>
(function (window, document, api, dashboardApi) {
  'use strict';

  if (!api || !dashboardApi) return;

  var APP = api.APP;

  function findJobById(jobId) {
    return (APP.jobs || []).filter(function (job) { return job.id === jobId; })[0] || null;
  }

  function renderDetailTable(job) {
    var rows = [
      ['Job ID', job.id || '-'],
      ['ลูกค้า', job.customer || '-'],
      ['อาการ', job.symptom || '-'],
      ['ช่าง', job.tech || '-'],
      ['สถานะ', job.statusLabel || '-'],
      ['สร้างเมื่อ', api.formatDateTime(job.createdAt)],
      ['อัปเดต', api.formatDateTime(job.updatedAt)],
      ['วันนัด', job.appointmentAt ? api.formatDateTime(job.appointmentAt) : 'ยังไม่กำหนด'],
      ['หมายเหตุ', job.note || '-']
    ];
    APP.ui.jobDetailTableBody.innerHTML = rows.map(function (row) {
      return '<tr><th>' + api.escapeHtml(row[0]) + '</th><td>' + api.escapeHtml(row[1]) + '</td></tr>';
    }).join('');
    APP.ui.jobFolderLinkWrap.innerHTML = job.folderUrl
      ? '<a href="' + api.escapeHtml(job.folderUrl) + '" target="_blank" rel="noopener noreferrer">เปิดโฟลเดอร์รูปงาน</a>'
      : '<span class="muted-text">ยังไม่มีโฟลเดอร์รูปงาน</span>';
  }

  function renderActionButtons(job) {
    var state = null;
    var statusCode = String(job.statusCode || '');
    (APP.statusConfig || []).some(function (item) {
      var byCode = statusCode && String(item.code) === statusCode;
      var byLabel = String(item.label || '') === String(job.statusLabel || '');
      if (byCode || byLabel) {
        state = item;
        return true;
      }
      return false;
    });

    var html = '<button type="button" class="mini-action" data-job-action="refresh">รีโหลดข้อมูล</button>';
    (state && state.allowed_next || []).forEach(function (next) {
      html += '<button type="button" class="mini-action" data-next-status="' + api.escapeHtml(String(next.code)) + '">' + api.escapeHtml(String(next.label || next.code)) + '</button>';
    });
    APP.ui.jobActionButtons.innerHTML = html;
  }

  function normalizeGalleryPayload(payload) {
    if (!payload) return [];
    if (Array.isArray(payload)) return payload;
    if (Array.isArray(payload.photos)) return payload.photos;
    if (Array.isArray(payload.items)) return payload.items;
    if (Array.isArray(payload.images)) return payload.images;
    return [];
  }

  function normalizePhotoItem(item, index) {
    if (typeof item === 'string') {
      return { url: item, thumb: item, title: 'Photo ' + (index + 1) };
    }
    item = item || {};
    var url = item.download_url || item.photo_url || item.file_url || item.url || item.thumbnail_url || item.thumb || '';
    var thumb = item.thumbnail_url || item.thumb || item.download_url || item.photo_url || item.file_url || item.url || '';
    return {
      url: url,
      thumb: thumb,
      title: item.file_name || item.name || ('Photo ' + (index + 1))
    };
  }

  function renderPhotos(items) {
    var photos = (items || []).map(normalizePhotoItem).filter(function (item) { return !!item.url; });
    APP.selectedPhotos = photos;
    if (!photos.length) {
      APP.ui.jobThumbGrid.innerHTML = '<div class="thumb-empty">ไม่พบรูปงาน</div>';
      return;
    }

    APP.ui.jobThumbGrid.innerHTML = photos.slice(0, 12).map(function (photo, index) {
      return '<button type="button" class="thumb-item" data-photo-index="' + index + '"><img src="' + api.escapeHtml(photo.thumb || photo.url) + '" alt="' + api.escapeHtml(photo.title) + '"></button>';
    }).join('');
  }

  function renderTimeline(payload) {
    var items = [];
    if (payload && Array.isArray(payload.timeline)) items = payload.timeline;
    else if (Array.isArray(payload)) items = payload;
    else if (payload && Array.isArray(payload.items)) items = payload.items;

    if (!items.length) {
      APP.ui.jobTimelineWrap.innerHTML = '<div class="empty-state">ไม่พบ timeline ของงานนี้</div>';
      return;
    }

    APP.ui.jobTimelineWrap.innerHTML = '<ul class="timeline-list">' + items.map(function (item) {
      var title = item.title || item.action || item.status || 'Activity';
      var detail = item.detail || item.message || item.note || '-';
      var actor = item.user || item.actor || item.by || '-';
      var when = api.formatDateTime(item.created_at || item.timestamp || item.date || item.time || item.ts || '');
      return '<li class="timeline-item">' +
        '<div class="timeline-top"><strong>' + api.escapeHtml(String(title)) + '</strong><span class="muted-text">' + api.escapeHtml(String(when)) + '</span></div>' +
        '<div class="job-meta">' + api.escapeHtml(String(detail)) + '</div>' +
        '<div class="muted-text">โดย: ' + api.escapeHtml(String(actor)) + '</div>' +
      '</li>';
    }).join('') + '</ul>';
  }

  async function openJobDetail(jobId) {
    var job = findJobById(jobId);
    if (!job) {
      api.toast('ไม่พบข้อมูลงาน ' + jobId, 'error');
      return;
    }

    APP.selectedJobId = jobId;
    APP.selectedJob = job;
    api.setText(APP.ui.jobDrawerTitle, job.id + ' • ' + job.customer);
    api.setText(APP.ui.jobDrawerStatus, job.statusLabel + ' • ' + (job.tech || 'ยังไม่กำหนดช่าง'));
    APP.ui.jobQuickNoteInput.value = '';
    renderDetailTable(job);
    renderActionButtons(job);
    renderPhotos(job.photos || []);
    renderTimeline([]);
    api.openJobDrawer();

    try {
      var timelinePayload = await api.callServer('getJobTimeline', [jobId]);
      renderTimeline(timelinePayload);
    } catch (timelineError) {
      APP.ui.jobTimelineWrap.innerHTML = '<div class="error-text">โหลด timeline ไม่สำเร็จ</div>';
    }

    try {
      var galleryPayload = await api.callServer('getPhotoGalleryData', [{ job_id: jobId }]);
      renderPhotos(normalizeGalleryPayload(galleryPayload));
    } catch (galleryError) {
      renderPhotos(job.photos || []);
    }
  }

  async function changeJobStatus(jobId, nextStatusCode) {
    var note = String(APP.ui.jobQuickNoteInput.value || '').trim();
    var payload = {
      job_id: jobId,
      new_status: nextStatusCode,
      note: note,
      user: 'WEB_DASHBOARD_V55'
    };
    var result = await api.callServer('updateJobStatus', [payload]);
    if (!result || result.success === false || result.error) {
      throw new Error((result && (result.error || result.message)) || 'เปลี่ยนสถานะไม่สำเร็จ');
    }
  }

  async function saveQuickNote() {
    var jobId = APP.selectedJobId;
    var note = String(APP.ui.jobQuickNoteInput.value || '').trim();
    if (!jobId || !note) {
      api.toast('กรุณากรอกหมายเหตุก่อนบันทึก', 'warning');
      return;
    }
    var result = await api.callServer('addQuickNote', [jobId, note, 'WEB_DASHBOARD_V55']);
    if (!result || result.success === false || result.error) {
      throw new Error((result && (result.error || result.message)) || 'บันทึกหมายเหตุไม่สำเร็จ');
    }
    APP.ui.jobQuickNoteInput.value = '';
    api.toast('บันทึกหมายเหตุแล้ว', 'success');
    await dashboardApi.fetchDashboardData({ silent: true });
    await openJobDetail(jobId);
  }

  async function fetchPhotoFile(photo, index) {
    var response = await fetch(photo.url, { mode: 'cors' });
    var blob = await response.blob();
    var extension = blob.type === 'image/png' ? 'png' : 'jpg';
    return new File([blob], 'job-photo-' + (index + 1) + '.' + extension, { type: blob.type || 'image/jpeg' });
  }

  async function shareSelectedPhotos() {
    var photos = APP.selectedPhotos || [];
    if (!photos.length) {
      api.toast('ไม่มีรูปสำหรับแชร์', 'warning');
      return;
    }

    if (navigator.share) {
      try {
        if (api.canWebShareFiles()) {
          var files = [];
          for (var i = 0; i < Math.min(photos.length, 2); i++) {
            files.push(await fetchPhotoFile(photos[i], i));
          }
          if (navigator.canShare({ files: files })) {
            await navigator.share({
              title: APP.selectedJobId || 'COMPHONE Job',
              text: 'แชร์รูปงานจาก COMPHONE SUPER APP V5.5',
              files: files
            });
            return;
          }
        }
        await navigator.share({
          title: APP.selectedJobId || 'COMPHONE Job',
          text: 'รูปงาน: ' + photos.map(function (item) { return item.url; }).join('\n')
        });
        return;
      } catch (shareError) {}
    }

    try {
      await navigator.clipboard.writeText(photos.map(function (item) { return item.url; }).join('\n'));
      api.toast('คัดลอกลิงก์รูปแล้ว', 'success');
    } catch (copyError) {
      api.toast('แชร์รูปไม่สำเร็จ', 'error');
    }
  }

  function renderCustomerSuggestions(items) {
    if (!APP.ui.customerSuggestions) return;
    if (!items.length) {
      APP.ui.customerSuggestions.innerHTML = '';
      api.hide(APP.ui.customerSuggestions);
      return;
    }

    APP.ui.customerSuggestions.innerHTML = items.slice(0, 8).map(function (customer, index) {
      var phone = customer.phone || customer.line_user_id || customer.customer_type || '-';
      return '<button type="button" class="customer-option" data-customer-index="' + index + '">' +
        api.escapeHtml(String(customer.customer_name || '-')) +
        '<small>' + api.escapeHtml(String(customer.customer_id || '-')) + ' • ' + api.escapeHtml(String(phone)) + '</small>' +
      '</button>';
    }).join('');
    api.show(APP.ui.customerSuggestions);
  }

  var searchCustomersDebounced = api.debounce(async function () {
    var term = String(APP.ui.newJobCustomer.value || '').trim();
    APP.ui.newJobCustomerId.value = '';
    if (term.length < 2) {
      renderCustomerSuggestions([]);
      return;
    }
    try {
      var result = await api.callServer('listCustomers', [{ search: term }]);
      if (!result || result.success === false) throw new Error(result && result.error ? result.error : 'ค้นหาลูกค้าไม่สำเร็จ');
      APP.customerSuggestions = result.customers || [];
      renderCustomerSuggestions(APP.customerSuggestions);
    } catch (error) {
      renderCustomerSuggestions([]);
    }
  }, 280);

  function applyCustomerSelection(customer) {
    customer = customer || {};
    APP.ui.newJobCustomer.value = customer.customer_name || '';
    APP.ui.newJobCustomerId.value = customer.customer_id || '';
    renderCustomerSuggestions([]);
  }

  async function submitNewJobForm(event) {
    event.preventDefault();
    var payload = {
      customer_id: String(APP.ui.newJobCustomerId.value || '').trim(),
      customer_name: String(APP.ui.newJobCustomer.value || '').trim(),
      symptom: String(APP.ui.newJobSymptom.value || '').trim(),
      technician: String(APP.ui.newJobTech.value || '').trim(),
      note: String(APP.ui.newJobNote.value || '').trim(),
      current_status_code: 1,
      user: 'WEB_DASHBOARD_V55'
    };

    if (!payload.customer_name) {
      api.toast('กรุณาระบุชื่อลูกค้า', 'warning');
      APP.ui.newJobCustomer.focus();
      return;
    }
    if (!payload.symptom) {
      api.toast('กรุณาระบุอาการ / รายละเอียด', 'warning');
      APP.ui.newJobSymptom.focus();
      return;
    }

    try {
      api.setText(APP.ui.newJobFormMeta, 'กำลังสร้างงานใหม่...');
      var createResult = await api.callServer('createJob', [payload]);
      if (!createResult || createResult.success === false) {
        throw new Error(createResult && createResult.error ? createResult.error : 'สร้างงานไม่สำเร็จ');
      }

      var appointmentAt = String(APP.ui.newJobAppointment.value || '').trim();
      if (appointmentAt) {
        await api.callServer('updateJobScheduleV55', [{ job_id: createResult.job_id, appointment_at: appointmentAt }]);
      }

      api.toast('สร้างงานใหม่แล้ว: ' + createResult.job_id, 'success');
      APP.ui.newJobForm.reset();
      APP.ui.newJobCustomerId.value = '';
      renderCustomerSuggestions([]);
      api.setText(APP.ui.newJobFormMeta, 'สร้างงานใหม่สำเร็จ');
      await dashboardApi.fetchDashboardData({ silent: true });
      api.switchTab('jobs');
      await openJobDetail(createResult.job_id);
    } catch (error) {
      api.setText(APP.ui.newJobFormMeta, 'สร้างงานไม่สำเร็จ');
      api.toast('สร้างงานไม่สำเร็จ: ' + (error.message || error), 'error');
    }
  }

  function bindOverviewFilters() {
    document.querySelectorAll('[data-kpi-filter]').forEach(function (button) {
      button.addEventListener('click', function () {
        var mode = button.getAttribute('data-kpi-filter') || 'ALL';
        APP.filters.mode = mode;
        if (mode === 'LOW_STOCK') {
          api.switchTab('overview');
          var alertsSection = APP.ui.alertsList;
          if (alertsSection && typeof alertsSection.scrollIntoView === 'function') alertsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          api.toast('โหมดสต็อกต่ำ: ดูรายการแจ้งเตือนด้านล่าง', 'info');
          return;
        }
        APP.filters.status = 'ALL';
        if (APP.ui.statusFilter) APP.ui.statusFilter.value = 'ALL';
        api.switchTab('jobs');
        dashboardApi.renderStatusGrid();
        dashboardApi.renderRecentJobs();
      });
    });
  }

  function bindTabs() {
    document.querySelectorAll('[data-tab-target]').forEach(function (button) {
      button.addEventListener('click', function () {
        var name = button.getAttribute('data-tab-target');
        api.switchTab(name);
        if (name === 'calendar' && APP.calendar) {
          window.setTimeout(function () { APP.calendar.updateSize(); }, 40);
        }
      });
    });
  }

  function bindJobInteractions() {
    if (APP.ui.recentJobs) {
      APP.ui.recentJobs.addEventListener('click', function (event) {
        var card = event.target.closest('[data-job-id]');
        if (!card) return;
        openJobDetail(card.getAttribute('data-job-id'));
      });
    }

    if (APP.ui.statusGrid) {
      APP.ui.statusGrid.addEventListener('click', function (event) {
        var chip = event.target.closest('[data-status-label]');
        if (!chip) return;
        var label = chip.getAttribute('data-status-label') || 'ALL';
        APP.filters.mode = 'ALL';
        APP.filters.status = APP.filters.status === label ? 'ALL' : label;
        if (APP.ui.statusFilter) APP.ui.statusFilter.value = APP.filters.status;
        dashboardApi.renderStatusGrid();
        dashboardApi.renderRecentJobs();
        api.switchTab('jobs');
      });
    }

    if (APP.ui.searchInput) {
      APP.ui.searchInput.addEventListener('input', api.debounce(function () {
        APP.filters.query = APP.ui.searchInput.value || '';
        dashboardApi.renderRecentJobs();
      }, 180));
    }

    if (APP.ui.statusFilter) {
      APP.ui.statusFilter.addEventListener('change', function () {
        APP.filters.mode = 'ALL';
        APP.filters.status = APP.ui.statusFilter.value || 'ALL';
        dashboardApi.renderStatusGrid();
        dashboardApi.renderRecentJobs();
      });
    }
  }

  function bindHeaderActions() {
    if (APP.ui.refreshAllBtn) APP.ui.refreshAllBtn.addEventListener('click', function () { dashboardApi.fetchDashboardData(); });
    if (APP.ui.refreshJobsBtn) APP.ui.refreshJobsBtn.addEventListener('click', function () { dashboardApi.fetchDashboardData({ silent: true }); });
    if (APP.ui.clearFiltersBtn) APP.ui.clearFiltersBtn.addEventListener('click', function () {
      APP.filters.query = '';
      APP.filters.status = 'ALL';
      APP.filters.mode = 'ALL';
      if (APP.ui.searchInput) APP.ui.searchInput.value = '';
      if (APP.ui.statusFilter) APP.ui.statusFilter.value = 'ALL';
      dashboardApi.renderStatusGrid();
      dashboardApi.renderRecentJobs();
    });
    if (APP.ui.goJobsFromOverview) APP.ui.goJobsFromOverview.addEventListener('click', function () { api.switchTab('jobs'); });
    if (APP.ui.refreshCalendarBtn) APP.ui.refreshCalendarBtn.addEventListener('click', function () { dashboardApi.fetchDashboardData({ silent: true }); });
    if (APP.ui.calendarTodayBtn) APP.ui.calendarTodayBtn.addEventListener('click', function () { if (APP.calendar) APP.calendar.today(); });
  }

  function bindDrawerActions() {
    if (APP.ui.closeJobDrawerBtn) APP.ui.closeJobDrawerBtn.addEventListener('click', api.closeJobDrawer);
    if (APP.ui.jobDrawerBackdrop) APP.ui.jobDrawerBackdrop.addEventListener('click', function (event) {
      if (event.target === APP.ui.jobDrawerBackdrop) api.closeJobDrawer();
    });
    if (APP.ui.jobActionButtons) APP.ui.jobActionButtons.addEventListener('click', async function (event) {
      var actionBtn = event.target.closest('button');
      if (!actionBtn) return;
      if (actionBtn.getAttribute('data-job-action') === 'refresh') {
        await openJobDetail(APP.selectedJobId);
        return;
      }
      var nextStatus = actionBtn.getAttribute('data-next-status');
      if (!nextStatus) return;
      try {
        await changeJobStatus(APP.selectedJobId, nextStatus);
        api.toast('เปลี่ยนสถานะแล้ว', 'success');
        await dashboardApi.fetchDashboardData({ silent: true });
        await openJobDetail(APP.selectedJobId);
      } catch (error) {
        api.toast('เปลี่ยนสถานะไม่สำเร็จ: ' + (error.message || error), 'error');
      }
    });

    if (APP.ui.saveQuickNoteBtn) APP.ui.saveQuickNoteBtn.addEventListener('click', function () {
      saveQuickNote().catch(function (error) {
        api.toast('บันทึกหมายเหตุไม่สำเร็จ: ' + (error.message || error), 'error');
      });
    });

    if (APP.ui.refreshJobDetailBtn) APP.ui.refreshJobDetailBtn.addEventListener('click', function () {
      if (APP.selectedJobId) openJobDetail(APP.selectedJobId);
    });

    if (APP.ui.shareJobPhotosBtn) APP.ui.shareJobPhotosBtn.addEventListener('click', function () {
      shareSelectedPhotos().catch(function (error) {
        api.toast('แชร์รูปไม่สำเร็จ: ' + (error.message || error), 'error');
      });
    });

    if (APP.ui.jobThumbGrid) APP.ui.jobThumbGrid.addEventListener('click', function (event) {
      var button = event.target.closest('[data-photo-index]');
      if (!button) return;
      var index = Number(button.getAttribute('data-photo-index') || 0);
      var photo = (APP.selectedPhotos || [])[index];
      if (!photo) return;
      api.openLightbox(photo.url, photo.title || APP.selectedJobId || 'รูปงาน');
    });
  }

  function bindLightbox() {
    if (APP.ui.closeLightboxBtn) APP.ui.closeLightboxBtn.addEventListener('click', api.closeLightbox);
    if (APP.ui.imageLightbox) APP.ui.imageLightbox.addEventListener('click', function (event) {
      if (event.target === APP.ui.imageLightbox) api.closeLightbox();
    });
  }

  function bindCustomerAutocomplete() {
    if (!APP.ui.newJobCustomer) return;
    APP.ui.newJobCustomer.addEventListener('input', searchCustomersDebounced);
    APP.ui.newJobCustomer.addEventListener('focus', function () {
      if ((APP.customerSuggestions || []).length) renderCustomerSuggestions(APP.customerSuggestions);
    });

    if (APP.ui.customerSuggestions) {
      APP.ui.customerSuggestions.addEventListener('click', function (event) {
        var option = event.target.closest('[data-customer-index]');
        if (!option) return;
        var index = Number(option.getAttribute('data-customer-index') || -1);
        if (index < 0) return;
        applyCustomerSelection(APP.customerSuggestions[index]);
      });
    }

    document.addEventListener('click', function (event) {
      if (!APP.ui.customerSuggestions) return;
      if (event.target === APP.ui.newJobCustomer || APP.ui.customerSuggestions.contains(event.target)) return;
      renderCustomerSuggestions([]);
    });
  }

  function bindNewJobForm() {
    if (APP.ui.newJobForm) APP.ui.newJobForm.addEventListener('submit', submitNewJobForm);
    if (APP.ui.resetNewJobBtn) APP.ui.resetNewJobBtn.addEventListener('click', function () {
      APP.ui.newJobForm.reset();
      APP.ui.newJobCustomerId.value = '';
      renderCustomerSuggestions([]);
      api.setText(APP.ui.newJobFormMeta, 'พร้อมเปิดงานใหม่');
    });
  }

  function bindEscapeKey() {
    document.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape') return;
      api.closeLightbox();
      api.closeJobDrawer();
    });
  }

  async function bootstrap() {
    api.ensureUiRefs();
    bindTabs();
    bindOverviewFilters();
    bindJobInteractions();
    bindHeaderActions();
    bindDrawerActions();
    bindLightbox();
    bindCustomerAutocomplete();
    bindNewJobForm();
    bindEscapeKey();
    await dashboardApi.initializeDashboard();
  }

  document.addEventListener('DOMContentLoaded', function () {
    bootstrap().catch(function (error) {
      api.toast('เริ่มต้น Dashboard ไม่สำเร็จ: ' + (error.message || error), 'error');
    });
  });

  window.COMPHONE_V55_INTERACTIONS = {
    openJobDetail: openJobDetail,
    shareSelectedPhotos: shareSelectedPhotos,
    saveQuickNote: saveQuickNote
  };
})(window, document, window.comphoneV55, window.COMPHONE_V55_DASHBOARD);
</script>
