<!-- COMPHONE SUPER APP V5.5 -->
<script>
(function (window, document, api, dashboardApi) {
  'use strict';

  if (!api || !dashboardApi) return;

  var APP = api.APP;

  function getJobById(jobId) {
    var jobs = APP.jobs || [];
    for (var i = 0; i < jobs.length; i++) {
      var candidate = jobs[i] || {};
      var id = String(candidate.id || candidate.job_id || '');
      if (id === String(jobId || '')) return candidate;
    }
    return null;
  }

  function collectNextStates(currentJob) {
    var currentStatus = api.getStatusLabel(
      currentJob && (currentJob.status || currentJob.status_label || currentJob.current_status || currentJob.current_status_code)
    );
    for (var i = 0; i < APP.statusConfig.length; i++) {
      var state = APP.statusConfig[i];
      if (String(state.label || '') === currentStatus) {
        return state.allowed_next || [];
      }
    }
    return [];
  }

  function buildDetailRows(job) {
    var detail = [
      ['Job ID', String(job.id || job.job_id || '-')],
      ['ลูกค้า', String(job.customer || job.customer_name || job.name || '-')],
      ['อาการ / รายละเอียด', String(job.symptom || job.issue || job.description || '-')],
      ['ช่าง', String(job.tech || job.technician || '-')],
      ['สถานะ', api.getStatusLabel(job.status || job.status_label || job.current_status || job.current_status_code || '-')],
      ['สร้างเมื่อ', String(job.created || job.created_at || '-')],
      ['โฟลเดอร์', String(job.folder || job.folder_url || '-')]
    ];

    return detail.map(function (row) {
      return '<tr><th style="width:160px;padding:10px 12px;text-align:left;color:#94a3b8;border-top:1px solid rgba(148,163,184,.12);">' + api.escapeHtml(row[0]) + '</th><td style="padding:10px 12px;border-top:1px solid rgba(148,163,184,.12);">' + api.escapeHtml(row[1]) + '</td></tr>';
    }).join('');
  }

  async function loadTimeline(jobId) {
    var target = document.getElementById('jobTimelineWrap');
    if (!target) return;
    target.innerHTML = '<div style="padding:14px 0;color:#94a3b8;">กำลังโหลด timeline...</div>';
    try {
      var response = await api.callServer('getJobTimeline', [jobId]);
      var items = response && response.timeline ? response.timeline : [];
      if (!items.length) {
        target.innerHTML = '<div style="padding:14px 0;color:#94a3b8;">ยังไม่มีประวัติของงานนี้</div>';
        return;
      }
      var html = '<div style="display:grid;gap:10px;margin-top:10px;">';
      items.slice(0, 20).forEach(function (item) {
        html += '<div style="padding:14px;border-radius:14px;background:rgba(15,23,42,.58);border:1px solid rgba(148,163,184,.12);">';
        html += '<div style="font-size:12px;color:#94a3b8;">' + api.escapeHtml(String(item.ts || '-')) + '</div>';
        html += '<div style="font-weight:700;margin-top:6px;">' + api.escapeHtml(String(item.action || '-')) + '</div>';
        if (item.detail) html += '<div style="margin-top:6px;color:#cbd5e1;line-height:1.6;">' + api.escapeHtml(String(item.detail)) + '</div>';
        html += '</div>';
      });
      html += '</div>';
      target.innerHTML = html;
    } catch (error) {
      target.innerHTML = '<div style="padding:14px 0;color:#fca5a5;">โหลด timeline ไม่สำเร็จ: ' + api.escapeHtml(error.message || String(error)) + '</div>';
    }
  }

  async function applyStatusTransition(nextStatusCode) {
    var jobId = APP.selectedJobId;
    if (!jobId) return;
    try {
      var result = await api.callServer('transitionJob', [jobId, Number(nextStatusCode), { changed_by: 'V5.5 Dashboard', note: 'เปลี่ยนสถานะผ่าน Dashboard V5.5' }]);
      if (result && result.success === false) {
        throw new Error(result.error || 'เปลี่ยนสถานะไม่สำเร็จ');
      }
      api.toast('อัปเดตสถานะงานสำเร็จ', 'success');
      api.closeDialog();
      await dashboardApi.fetchDashboardData();
    } catch (error) {
      api.toast('เปลี่ยนสถานะไม่สำเร็จ: ' + (error.message || error), 'error');
    }
  }

  async function saveQuickNote() {
    var jobId = APP.selectedJobId;
    var textarea = document.getElementById('jobQuickNoteInput');
    var note = textarea ? String(textarea.value || '').trim() : '';
    if (!jobId || !note) {
      api.toast('กรอกหมายเหตุก่อนบันทึก', 'warning');
      return;
    }
    try {
      var result = await api.callServer('addQuickNote', [jobId, note, 'V5.5 Dashboard']);
      if (result && result.success === false) throw new Error(result.error || 'บันทึกหมายเหตุไม่สำเร็จ');
      api.toast('บันทึกหมายเหตุแล้ว', 'success');
      await loadTimeline(jobId);
      textarea.value = '';
    } catch (error) {
      api.toast('บันทึกหมายเหตุไม่สำเร็จ: ' + (error.message || error), 'error');
    }
  }

  function openJobDetail(jobId) {
    var job = getJobById(jobId);
    if (!job) {
      api.toast('ไม่พบข้อมูลงาน ' + jobId, 'error');
      return;
    }

    APP.selectedJobId = String(jobId);
    var nextStates = collectNextStates(job);
    var actionsHtml = '';

    if (nextStates.length) {
      nextStates.forEach(function (state) {
        actionsHtml += '<button type="button" data-next-status="' + api.escapeHtml(String(state.code)) + '" style="padding:12px 14px;border-radius:12px;border:1px solid rgba(56,189,248,.28);background:rgba(56,189,248,.14);color:#e2e8f0;cursor:pointer;font-weight:700;">ไปสถานะ: ' + api.escapeHtml(String(state.label || state.code)) + '</button>';
      });
    } else {
      actionsHtml = '<div style="color:#94a3b8;">สถานะนี้ไม่มีขั้นตอนถัดไป</div>';
    }

    var folderUrl = String(job.folder || job.folder_url || '');
    var folderLinkHtml = folderUrl && folderUrl !== '-' ? '<a href="' + api.escapeHtml(folderUrl) + '" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:#7dd3fc;">เปิดโฟลเดอร์งาน</a>' : '';

    var html = '';
    html += '<div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px;">';
    html += '<div><div style="display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(56,189,248,.12);border:1px solid rgba(56,189,248,.18);font-size:12px;font-weight:700;">COMPHONE SUPER APP V5.5</div>';
    html += '<h2 style="margin:14px 0 8px;font-size:28px;">รายละเอียดงาน ' + api.escapeHtml(String(job.id || job.job_id || '-')) + '</h2>';
    html += '<div style="color:#94a3b8;">' + api.escapeHtml(api.getStatusLabel(job.status || job.status_label || job.current_status || job.current_status_code || '-')) + '</div></div>';
    html += '<button type="button" id="closeDialogBtn" style="padding:10px 14px;border-radius:12px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.82);color:#e2e8f0;cursor:pointer;">ปิด</button>';
    html += '</div>';
    html += '<table style="width:100%;border-collapse:collapse;margin-bottom:18px;">' + buildDetailRows(job) + '</table>';
    html += folderLinkHtml;
    html += '<div style="display:grid;gap:10px;margin:22px 0;">';
    html += '<h3 style="margin:0;">เปลี่ยนสถานะงาน</h3>';
    html += '<div id="jobTransitionActions" style="display:flex;flex-wrap:wrap;gap:10px;">' + actionsHtml + '</div>';
    html += '</div>';
    html += '<div style="display:grid;gap:10px;margin:22px 0;">';
    html += '<h3 style="margin:0;">บันทึกหมายเหตุด่วน</h3>';
    html += '<textarea id="jobQuickNoteInput" rows="3" style="width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.82);color:#e2e8f0;resize:vertical;" placeholder="พิมพ์หมายเหตุหรือผลการติดตาม"></textarea>';
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
    html += '<button type="button" id="saveQuickNoteBtn" style="padding:12px 14px;border-radius:12px;border:none;background:linear-gradient(135deg, rgba(34,197,94,.92), rgba(22,163,74,.92));color:#08111f;cursor:pointer;font-weight:700;">บันทึกหมายเหตุ</button>';
    html += '<button type="button" id="refreshDialogDashboardBtn" style="padding:12px 14px;border-radius:12px;border:1px solid rgba(148,163,184,.18);background:rgba(15,23,42,.82);color:#e2e8f0;cursor:pointer;font-weight:700;">รีโหลดข้อมูล</button>';
    html += '</div></div>';
    html += '<div style="display:grid;gap:10px;">';
    html += '<h3 style="margin:0;">Timeline</h3>';
    html += '<div id="jobTimelineWrap"></div>';
    html += '</div>';

    api.openDialog(html);

    var closeBtn = document.getElementById('closeDialogBtn');
    if (closeBtn) closeBtn.addEventListener('click', api.closeDialog);

    var transitionWrap = document.getElementById('jobTransitionActions');
    if (transitionWrap) {
      transitionWrap.addEventListener('click', function (event) {
        var target = event.target;
        if (!target || !target.getAttribute) return;
        var nextStatus = target.getAttribute('data-next-status');
        if (nextStatus) applyStatusTransition(nextStatus);
      });
    }

    var noteBtn = document.getElementById('saveQuickNoteBtn');
    if (noteBtn) noteBtn.addEventListener('click', saveQuickNote);

    var refreshBtn = document.getElementById('refreshDialogDashboardBtn');
    if (refreshBtn) {
      refreshBtn.addEventListener('click', async function () {
        await dashboardApi.fetchDashboardData();
        await loadTimeline(APP.selectedJobId);
        api.toast('รีโหลดข้อมูลล่าสุดแล้ว', 'success');
      });
    }

    loadTimeline(jobId);
  }

  function syncFiltersFromUi() {
    APP.filters.query = APP.ui.jobSearchInput ? String(APP.ui.jobSearchInput.value || '') : '';
    APP.filters.status = APP.ui.statusFilterSelect ? String(APP.ui.statusFilterSelect.value || 'ALL') : 'ALL';
    APP.filters.limit = APP.ui.recentJobsLimitSelect ? Number(APP.ui.recentJobsLimitSelect.value || 20) : 20;
  }

  function clearFilters() {
    if (APP.ui.jobSearchInput) APP.ui.jobSearchInput.value = '';
    if (APP.ui.statusFilterSelect) APP.ui.statusFilterSelect.value = 'ALL';
    if (APP.ui.recentJobsLimitSelect) APP.ui.recentJobsLimitSelect.value = String((APP.config && APP.config.defaultLimit) || 20);
    syncFiltersFromUi();
    dashboardApi.renderRecentJobs();
  }

  async function handleRefresh() {
    syncFiltersFromUi();
    await dashboardApi.fetchDashboardData();
    api.toast('รีเฟรชข้อมูลสำเร็จ', 'success');
  }

  function bindEvents() {
    api.ensureUiRefs();
    if (APP.ui.jobSearchInput) {
      APP.ui.jobSearchInput.addEventListener('input', function () {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }
    if (APP.ui.statusFilterSelect) {
      APP.ui.statusFilterSelect.addEventListener('change', function () {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }
    if (APP.ui.recentJobsLimitSelect) {
      APP.ui.recentJobsLimitSelect.addEventListener('change', function () {
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }
    if (APP.ui.clearFilterBtn) APP.ui.clearFilterBtn.addEventListener('click', clearFilters);
    if (APP.ui.refreshDashboardBtn) APP.ui.refreshDashboardBtn.addEventListener('click', function () { handleRefresh(); });
    if (APP.ui.recentJobsTableBody) {
      APP.ui.recentJobsTableBody.addEventListener('click', function (event) {
        var row = event.target;
        while (row && row.tagName !== 'TR') row = row.parentNode;
        if (!row) return;
        var jobId = row.getAttribute('data-job-id');
        if (jobId) openJobDetail(jobId);
      });
    }
    if (APP.ui.statusBoard) {
      APP.ui.statusBoard.addEventListener('click', function (event) {
        var card = event.target;
        while (card && !card.getAttribute('data-status-label')) card = card.parentNode;
        if (!card) return;
        var statusLabel = card.getAttribute('data-status-label') || 'ALL';
        if (APP.ui.statusFilterSelect) APP.ui.statusFilterSelect.value = statusLabel;
        syncFiltersFromUi();
        dashboardApi.renderRecentJobs();
      });
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    bindEvents();
    syncFiltersFromUi();
    dashboardApi.initializeDashboard();
  });
})(window, document, window.comphoneV55, window.COMPHONE_V55_DASHBOARD);
</script>
